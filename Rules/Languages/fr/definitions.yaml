---
- include: "../../definitions.yaml"

# French overrides for language-dependent speech definitions. Anything omitted
# here continues to fall back to the shared English defaults.

# If an "intent" is used, the 'terse:medium:verbose' speech for the intent name is given here for a prefix||infix||postfix||function fixity
# If only one ":" is used, the first part is used for 'terse' and the second part is used for 'medium' and 'verbose'
# If no ":"s are used, the same speech is used for all forms
# If bracketing words make sense, they are separated with ";"s
# Intent mappings must specify whether they are "prefix", "infix", "postfix", or "function" with an "=" sign
# If there are multiple fixities (e.g., see transpose), they are separated with "||"
#   for readability, spaces can be used around any of the delimiter characters
# Note: if there are multiple fixities, the first one is used if the fixity is not given in the intent

- IntentMappings: {
    "indexed-by": "infix= ; indice; fin d'indice: fin d'indice: fin d'indice",
    "modified-variable": "silent= ",
    "say-super": "infix=super: exposant: exposant",
    "skip-super": "silent=",

    "absolute-value": "function= ; valeur absolue: la valeur absolue: la valeur absolue; fin de valeur absolue",
    "binomial": "infix=binôme; parmi; fin du binôme",
    "dimension-product": "infix=par",
    "greatest-common-divisor": "function=pgcd: le pgcd: le plus grand commun diviseur",
    "imaginary-part": "function=partie imaginaire: la partie imaginaire: la partie imaginaire",
    "least-common-multiple": "function=ppcm: le ppcm: le plus petit commun multiple",
    "limit": "prefix=limite quand: la limite quand: la limite quand",
    "lim-sup": "prefix=lim sup quand: la limite supérieure quand: la limite supérieure quand",
    "lim-inf": "prefix=lim inf quand: la limite inférieure quand: la limite inférieure quand",
    "logarithm-with-base": "prefix=log en base: le log en base: le log en base",
    "natural-logarithm": "function=l n: logarithme naturel: logarithme naturel",
    "minus": "infix=moins || prefix=moins",
    "plus": "infix=plus || prefix=positif",
    "real-part": "function=la partie réelle",

    "transpose": "postfix=transposée || function=transposée",
    "norm": "function= ; norme: norme: la norme de; fin de norme",
    "trace": "function= ; trace : trace: la trace de; fin de trace",
    "dimension": "function= ; dimension : dimension: la dimension de; fin de dimension",
    "homomorphism": "function= ; homomorphisme : homomorphisme: l'homomorphisme de; fin de l'homomorphisme",
    "kernel": "function= ; noyau : noyau: le noyau de; fin du noyau",
    "vector": "function= ; vecteur || prefix=vecteur",
    "cross-product": "infix=croix: produit vectoriel: produit vectoriel",
    "dot-product": "infix=point: produit scalaire: point: produit scalaire",

    "divergence": "function= ; div: divergence: divergence; fin de divergence",
    "curl": "function= ; rotationnel: rotationnel: rotationnel; fin du rotationnel",
    "gradient": "function= ; del: gradient: gradient; fin de gradient",
    "laplacian": "function=laplacien",

    "chemistry-concentration": "function= ; concentration: concentration de: la concentration de; fin de concentration",
  }

# Names of functions that in terse mode don't say "of" (or it's equivalent in other languages)
- TerseFunctionNames: {
    "divergence", "gradient", "curl"
  }

# These are the parts of a formula that can be navigated to
- NavigationParts: {
    "large-op": "base; borne inférieure; borne supérieure",
    "mfrac": "numérateur; dénominateur",
    "fraction": "numérateur; dénominateur",
    "msqrt": "racine",
    "square-root": "racine",
    "mroot": "racine; indice de racine",
    "root": "racine; indice de racine",
    "msub": "base; indice",
    "sub": "base; indice",
    "logarithm-with-base": "base",
    "indexed-by": "base; indice",
    "msup": "base; exposant",
    "say-super": "base; exposant",
    "skip-super": "base; exposant",
    "power": "base; exposant",
    "msubsup": "base; indice; exposant",
    "munder": "base; borne inférieure",
    "mover": "base; borne supérieure",
    "munderover": "base; borne inférieure; borne supérieure",

    # words for moving into and out of one of the parts (e.g., "move right 'out of' numerator, 'in' denominator")
    # it's a hack to put them here, but at least they are grouped with the other navigation parts
    "in": "dans",
    "out": "hors de",
  }

- SIPrefixes: {
    "Q": "quetta", "R": "ronna", "Y": "yotta", "Z": "zetta", "E": "exa", "P": "peta", "T": "tera", "G": "giga",
    "M": "mega", "k": "kilo", "h": "hecto", "da": "déca", "d": "déci", "c": "centi", "m": "milli", "µ": "micro",
    "n": "nano", "p": "pico", "f": "femto", "a": "atto", "z": "zepto", "y": "yocto", "r": "ronto", "q": "quecto"
  }

# this is a list of all units that accept SIPrefixes
# from www.bipm.org/documents/20126/41483022/SI-Brochure-9-EN.pdf
#   Prefixes may be used with any of the 29 SI units with special names
