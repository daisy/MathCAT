---

- name: line-segment
  tag: line-segment
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "le segment de droite de"
      - x: "*[1]"
      - T: "à"
      - x: "*[2]"
      else:
      - T: "segment"
      - x: "*[1]"
      - x: "*[2]"

- name: geometry-ray
  tag: ray
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "la demi-droite de"
      - x: "*[1]"
      - T: "à"
      - x: "*[2]"
      else:
      - T: "demi-droite"
      - x: "*[1]"
      - x: "*[2]"

- name: geometry-arc
  tag: arc
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "l'"]
  - T: "arc"
  - x: "*[1]"
  - x: "*[2]"

- name: measure-of-angle
  tag: measure-of-angle
  match: "count(*)=3"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "la mesure de l'angle"
      else:
      - T: "mesure de l'angle"
  - x: "*[1]"
  - x: "*[2]"
  - x: "*[3]"

- name: coordinate
  tag: coordinate
  match: "."
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "le"]
  - T: "point"
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "de coordonnées"]
  - pause: short
  - insert:
      nodes: "*"
      replace: [T: "virgule", pause: auto]
  - pause: short
  - test:
      if: "($SpeechStyle='ClearSpeak' and $Verbosity='Verbose') or not(IsNode(*[last()],'leaf'))"
      then: [T: "fin du point"]
