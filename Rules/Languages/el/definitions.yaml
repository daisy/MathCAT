    # base units
    "A": "αμπέρ",
    "cd": "κάντελα",
    "K": "κέλβιν", "K": "κέλβιν", # U+212A
    "g": "γραμμάριο",
    "m": "μέτρο",
    "mol": "mol",
    "s": "δευτερόλεπτο", "sec": "δευτερόλεπτο",  # "sec" not actually legal

    # derived units
    "Bq": "μπεκερέλ",
    "C": "κουλόμπ",
    "°C": "βαθμός Κελσίου", "℃": "βαθμός Κελσίου", # should only take negative powers
    "F": "φαράντ",
    "Gy": "γκρί",
    "H": "ενρί",
    "Hz": "χέρτζ",
    "J": "τζουλ",
    "kat": "κάταλ",
    "lm": "λούμεν",
    "lx": "λουξ",
    "N": "νεύτον",
    "Ω": "ωμ", "Ω": "ωμ",       # U+2126 OHM SIGN
    "Pa": "πασκάλ",
    "S": "σιμένς",
    "Sv": "σίβερτ",
    "T": "τέσλα",
    "V": "βολτ",
    "W": "βατ",
    "Wb": "βέμπερ",

    # accepted (plus a few variants) that take SI prefixes
    "l": "λίτρο", "L": "λίτρο", "ℓ": "λίτρο",  # Should only take negative powers; British spelling works for US also
    "t": "μετρικός τόνος",           # should only take positive powers
    "Da": "ντάλτον",
    "Np": "νέπερ",               # should only take negative powers
    "u": "ατομική μονάδα μάζας",     # 'u' is correct: https://en.wikipedia.org/wiki/Dalton_(unit)
    "eV": "ηλεκτρονιοβολτ",
    "rad": "ακτίνιο",             # should only take negative powers
    "sr": "στερακτίνιο",           # should only take negative powers

    # others that take a prefix
    "a": "έτος",               # should only take positive powers
    "as": "δευτερόλεπτο τόξου",          # see en.wikipedia.org/wiki/Minute_and_second_of_arc

    # technically wrong, but used in practice with SI Units
    "b": "μπιτ",               # should only take positive powers
    "B": "μπάιτ",              # should only take positive powers
    "Bd": "μπόντ",             # should only take positive powers
  }


