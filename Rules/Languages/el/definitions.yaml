# Lines starting with "#" are a comment
# Each definition in this file is of the form
#   name: { "...", "..." "..." }
# For numbers, 
# - name: [] "...", "..." "..." ]


# ----------------  Cardinal and Ordinal Numbers  --------------------------
# The following definitions are used to convert numbers to words
# The are mainly used for ordinals, of which there are two cases:
# 1. Regular ordinals: first, second, third, ...
# 2. Ordinals used in the denominator of fractions (e.g, one half, one third)
#    When used in the denominator of fractions, a plural version might be
#    used (e.g., two halves, two thirds)
# Although a lot of languages are regular after a few entries, for generality,
# the following lists should be filled out even though they are the same
# or easily derived from others in many languages (e.g, an 's' is added for plurals).
# The larger ordinal numbers (e.g, millionth) is used when there are only
# '0's after that decimal place (e.g., 23000000).:w

# All definitions start 0, 10, 100, etc.

# The definitions for the "ones" should extend until a regular pattern begins
#   The minimum length is 10.

# For English, a regular pattern starts at twenty

# theodora. NumbersOrdinalOnes, NumbersOrdinalTens, NumbersOrdinalHundreds and NumbersOrdinalLarge
# are used in roots and powers, all feminine gendered in greek, so for now one case for ordinals is sufficient.
# however, if in the future these rules are applied elsewhere, adding more grammatical genders might
# be needed.
- NumbersOnes: [
        "μηδέν", "ένα", "δύο", "τρία", "τέσσερα", "πέντε", "έξι", "επτά", "οκτώ", "εννιά",
        "δέκα", "έντεκα", "δώδεκα", "δεκατρία", "δεκατέσσερα", "δεκαπέντε", "δεκαέξι",
        "δεκαεπτά", "δεκαοκτώ", "δεκαεννέα"
    ]

#check again
- NumbersOrdinalOnes: [
         "μηδενική", "πρώτη", "δεύτερη", "τρίτη", "τέταρτη", "πέμπτη", "έκτη", "έβδομη", "όγδοη", "ένατη", "δέκατη", "ενδέκατη", "δωδέκατη", "δέκατη τρίτη", "δέκατη τέταρτη", "δέκατη πέμπτη", "δέκατη έκτη", "δέκατη έβδομη", "δέκατη όγδοοη", "δέκατη ένατη"
    ]

#check again
- NumbersOrdinalPluralOnes: [
         "μηδενικοί", "πρώτοι", "δεύτεροι", "τρίτοι", "τέταρτοι", "πέμπτοι", "έκτοι", "έβδομοι", "όγδοοι", "ένατοι",
         "δέκατοι", "ενδέκατοι", "δωδέκατοι"
    ]

    # stop when regularity begins
- NumbersOrdinalFractionalOnes: [
         "μηδενικό", "πρώτο", "δεύτερο", "τρίτο", "τέταρτο", "πέμπτο", "έκτο", "έβδομο", "όγδοο", "ένατο", "δέκατο", "ενδέκατο", "δωδέκατο", "δέκατο τρίτο", "δέκατο τέταρτο", "δέκατο πέμπτο", "δέκατο έκτο", "δέκατο έβδομο", "δέκατο όγδοο", "δέκατο ένατο"
    ]

    # stop when regularity begins
- NumbersOrdinalFractionalPluralOnes: [
         "μηδενικά", "πρώτα", "δεύτερα", "τρίτα", "τέταρτα", "πέμπτα", "έκτα", "έβδομα", "όγδοα", "ένατα", "δέκατα", "ενδέκατα", "δωδέκατα", "δέκατα τρίτα", "δέκατα τέταρτα", "δέκατα πέμπτα", "δέκατα έκτα", "δέκατα έβδομα", "δέκατα όγδοα", "δέκατα ένατα"
    ]


