---
- include: "../../definitions.yaml"

# If an "intent" is used, the 'terse:medium:verbose' speech for the intent name is given here for a prefix||infix||postfix||function fixity
# If only one ":" is used, the first part is used for 'terse' and the second part is used for 'medium' and 'verbose'
# If no ":"s are used, the same speech is used for all forms
# If bracketing words make sense, they are separated with ";"s
# Intent mappings must specify whether they are "prefix", "infix", "postfix", or "function" with an "=" sign
# If there are multiple fixities (e.g., see transpose), they are separated with "||"
#   for readability, spaces can be used around any of the delimiter characters
# Note: if there are multiple fixities, the first one is used if the fixity is not given in the intent
- IntentMappings: {
    "indexed-by": "infix= ; δείκτης κάτω; τέλος δείκτη κάτω: τέλος δείκτη κάτω: τέλος δείκτη κάτω",
    "modified-variable": "silent= ",
    "say-super": "infix=υπέρ: εκθέτης: εκθέτης",   # used with 'mo' for superscripts (e.g, "<")
    "skip-super": "silent=",   # used with 'mo' for superscripts (e.g, "*")

    "absolute-value": "function= ; απόλυτη τιμή: η απόλυτη τιμή: η απόλυτη τιμή; τέλος απόλυτης τιμής",
    "binomial": "infix=διωνυμικός συντελεστής; επιλογή; τέλος διωνυμικού",
    "dimension-product": "infix=επί",
    # "closed-interval": "other=closed-interval; from,to; end closed-interval",
    "greatest-common-divisor": "function=μκδ: ο μέγιστος κοινός διαιρέτης: ο μέγιστος κοινός διαιρέτης",
    "imaginary-part": "function=φανταστικό μέρος: το φανταστικό μέρος: το φανταστικό μέρος",
    "least-common-multiple": "function=εκπ: το ελάχιστο κοινό πολλαπλάσιο: το ελάχιστο κοινό πολλαπλάσιο",
    # "large-op": "infix=over || other=from,to",
    "limit": "prefix=όριο καθώς: το όριο καθώς: το όριο καθώς",
    "lim-sup": "prefix=lim sup καθώς: ανώ όριο καθώς: ανώ όριο καθώς",
    "lim-inf": "prefix=lim inf καθώς: κάτω όριο καθώς: κάτω όριο καθώς",
    "logarithm-with-base": "prefix=λογάριθμος με βάση: ο λογάριθμος με βάση: ο λογάριθμος με βάση",
    "natural-logarithm": "function=φυσικός λογάριθμος: φυσικός λογάριθμος: φυσικός λογάριθμος",
    "minus": "infix=μείον || prefix=αρνητικός",
    "plus": "infix=συν || prefix=θετικός",
    # "pochhammer": "infix=permutations of",  # arguments are in reverse order, so can't work here
    "real-part": "function=το πραγματικό μέρος",

    "transpose": "postfix=μετάθεση || function=μετάθεση",
    "norm": "function=; νόρμα: νόρμα: νόρμα; τέλος νόρμας",
    "trace": "function= ; ίχνος: ίχνος: το ίχνος; τέλος ίχνους",
    "dimension": "function=; διάσταση: διάσταση: η διάσταση; τέλος διάστασης",
    "homomorphism": "function= ; ομομορφισμός: ομομορφισμός: ο ομομορφισμός; τέλος ομομορφισμού",
    "kernel": "function= ; πυρήνας: πυρήνας: ο πυρήνας; τέλος πυρήνα",
    "vector": "function= ; διάνυσμα || prefix=διάνυσμα",
    "cross-product": "infix=εξωτερικό γινόμενο: εξωτερικό γινόμενο: εξωτερικό γινόμενο",
    "dot-product": "infix=εσωτερικό γινόμενο: εσωτερικό γινόμενο: εσωτερικό γινόμενο",

    "divergence": "function= ; απόκλιση: απόκλιση: απόκλιση; τέλος απόκλισης",
    "curl": "function= ; στροβιλισμός; τέλος στροβιλισμού",
    "gradient": "function= ; κλίση: κλίση: η κλίση; τέλος κλίσης",
    "laplacian": "function=λαπλασιανός",   # speech engines don't do a good job with "laplacian"

    "chemistry-concentration": "function= ; συγκέντρωση: συγκέντρωση του: η συγκέντρωση του; τέλος συγκέντρωσης",
  }

  # Names of functions that in terse mode don't say "of" (or it's equivalent in other languages)
- TerseFunctionNames: {
    "divergence", "gradient", "curl"
  }

- NavigationParts: {
    # These are the parts of a formula that can be navigated to
    "large-op": "βάση; κάτω όριο; άνω όριο",
    "mfrac": "αριθμητής; παρονομαστής",
    "fraction": "αριθμητής; παρονομαστής",
    "msqrt": "ρίζα",
    "square-root": "ρίζα",
    "mroot": "ρίζα; δείκτης ρίζας",
    "root": "ρίζα; δείκτης ρίζας",
    "msub": "βάση; δείκτης κάτω",
    "sub": "βάση; δείκτης κάτω",
    "logarithm-with-base": "βάση",
    "indexed-by": "βάση; δείκτης κάτω",
    "msup": "βάση; δείκτης πάνω",
    "say-super": "βάση; δείκτης πάνω",
    "skip-super": "βάση; δείκτης πάνω",
    "power": "βάση; εκθέτης",
    "msubsup": "βάση; δείκτης κάτω; δείκτης πάνω",
    "munder": "βάση; κάτω όριο",
    "mover": "βάση; άνω όριο",
    "munderover": "βάση; κάτω όριο; άνω όριο",

    # words for moving into and out of one of the parts (e.g., "move right 'out of' numerator, 'in' denominator")
    # it's a hack to put them here, but at least they are grouped with the other navigation parts
    "in": "σε",
    "out": "έξω από",
  }

- KnownWords: {
    # MathCAT will put together some runs of three or more mi's (a common mistake), but skips those in alphabetical order.
    # This is a list of exceptions so that they do get put together. Don't list words with repeated letters.

    # I asked bard and chatgpt for formula words that are alphabetical, and they failed.
    # Here are the words I managed to find, but it almost certainly not complete. Change the list for other languages.
    "Abel", "aery", "ails", "airy", "amps", "ceil", "cents", "chop", "flux", "flow", "knot", "most"
  }

- SIPrefixes: {
    "Q": "κουέττα", "R": "ροννά", "Y": "γιοττά", "Z": "ζεττά", "E": "εξά", "P": "πετά", "T": "τερά", "G": "γκίγκα", "M": "μέγα", "k": "κιλό", "h": "εκτό", "da": "δεκά",
    "d": "δεσί", "c": "εκατοστό", "m": "χιλιοστό", "µ": "μικρό", "n": "νάνο", "p": "πικο", "f": "φεμτό", "a": "αττό", "z": "ζεπτό", "y": "γιοκτό", "r": "ροντό", "q": "κουεκτό"
