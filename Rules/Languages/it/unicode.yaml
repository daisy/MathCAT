---
 # Note to translators:
 #   most languages don't have two ways to pronounce 'a' -- if not need, remove the rules and change "B-Z" to "A-Z"
 #   some languages say the word for "uppercase" after the letter. Make sure to change that where appropriate by moving some code around
 - "a-z": 
    - test: 
        if: "$TTS='none'"
        then: [T: "."]                          
        else: [spell: "'.'"]                       
 - "A-Z":
    - test: 
        if: "$CapitalLetters_Beep"
        then:
        - audio:
            value: "beep.mp4"
            replace: []
    - test: 
        if: "$CapitalLetters_UseWord"
        then_test:
          if: "$SpeechOverrides_CapitalLetters = ''"
          then_test:
            if: "$Impairment = 'Blindness'"
            then: [T: "maiuscola"]              	# 	(en: 'cap', google translation)
          else: [x: "$SpeechOverrides_CapitalLetters"] 
    - pitch:
        value: "$CapitalLetters_Pitch"
        # note: processing of ranges converts '.' into the character, so it needs to be in quotes below
        replace: [spell: "translate('.', 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', 'abcdefghijklmnopqrstuvwxyz')"]

 - "0-9": [T: "."]                              	# 	(en: '.')

 - " ": [t: " "]                                  # 0x20

 - "!": [T: "fattoriale"]                        	#  0x21
 - "\"": [T: "barra inversa"]                   	#  0x22	(en: 'quotation mark')
 - "#": [T: "almohadilla"]                      	#  0x23	(en: 'number', MathPlayer: 'signo de número', google: 'número')
 - "$": [T: "dóllari"]                            	#  0x24	(en: 'dollars')
 - "%": [T: "porciento"]                        	#  0x25	(en: 'percent')
 - "&": [T: "e commerciale"]                        	#  0x26
 - "'": [T: "apostrofo"]                            	#  0x27	(en: 'apostrophe', MathPlayer: 'apóstrofo', google: 'apóstrofe')
 - "(":                                         	#  0x28
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then_test:
            if: "$Verbosity='Terse'"
            then: [T: "aperta tonda"]                	# 	(en: 'open', google translation)
            else: [T: "aperta parentesi tonda"]   	# 	(en: 'open paren', MathPlayer: 'paréntesis', google: 'paréntesis abierto')
        else: [T: "aperta parentesi tonda"]       	# 	(en: 'left paren', MathPlayer: 'paréntesis', google: 'paréntesis dejado')
 - ")":                                         	#  0x29
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then_test:
            if: "$Verbosity='Terse'"
            then: [T: "chiusa tonda"]                  	# 	(en: 'close', google translation)
            else: [T: "chiusa parentesi tonda"]     	# 	(en: 'close paren', MathPlayer: 'cierra paréntesis', google: 'paréntesis cercana')
        else: [T: "chiusa parentesi tonda"]         	# 	(en: 'right paren', MathPlayer: 'cierra paréntesis')

 - "*":                                         	#  0x2a
    test:
        if: "parent::*[name(.)='msup' or name(.)='msubsup']"
        then: [T: "asterisco"]                   	# 	(en: 'star', google translation)
        else: [T: "per"]                        	# 	(en: 'times')
 - "+": [T: "più"]                              	#  0x2b	(en: 'plus')
 - ",":                                         	#  0x2c
    # the following deals with the interaction of "," with "…" which sometimes wants the ',' to be silent
    # that this test is here and not with "…" is not ideal, but seems simplest
     test:
        if:
            - "$SpeechStyle != 'ClearSpeak' or $ClearSpeak_Ellipses = 'Auto' or "
               # must be ClearSpeak and $ClearSpeak_Ellipses = 'AndSoOn'
               # speak "comma" when not adjacent to '…'
            - "( following-sibling::*[1][text()!= '…'] and preceding-sibling::*[1][text()!='…']  ) or "
               # except if expression starts with '…'
            - "../*[1][.='…'] "
        then:
        - T: "virgola"                         # 	(en: 'comma', google translation)
        - test:
            if: "$Verbosity != Terse"
            then: [pause: short]
        # else silent

 - "-": [T: "meno"]                            	#  0x2d	(en: 'minus')
 - ".":                                         	#  0x2e
    - test:
        if: "parent::*[1][self::m:mn]"
        then: [T: "punto"]                      	# 	(en: 'point', google translation)
        else: [T: "punto"]                      	# 	(en: 'dot')
 - "/": [T: "diviso"]                    	#  0x2f	(en: 'divided by')
 - ":": [T: "due punti"]                       	#  0x3a	(en: 'colon')
 - ";": [T: "punto e virgola"]                     	#  0x3b	(en: 'semicolon')
 - "<":                                         	#  0x3c
     - test: 
         if: "$Verbosity!='Terse'"
         then: [T: "è"]                        	# 	(en: 'is', google translation)
     - T: "minore di"                           	# 	(en: 'less than')
 - "=":                                         	#  0x3d
    - test: 
        if: "$Verbosity!='Terse'"
        then: [T: "è uguale a"]                 	# 	(en: 'is equal to', google translation)
        else: [T: "uguale a"]                      	# 	(en: 'equals', google: 'iguales')

 - ">":                                         	#  0x3e
     - test: 
         if: "$Verbosity!='Terse'"
         then: [T: "è"]                        	# 	(en: 'is', google translation)
     - T: "maggiore di"                           	# 	(en: 'greater than')
 - "?": [T: "punto di domanda"]            	#  0x3f	(en: 'question mark', MathPlayer: 'cierra interrogación', google: 'signo de interrogación')
 - "@": [T: "chiocciola"]                           	#  0x40	(en: 'at sign')
 - "[":                                         	#  0x5b
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then: [T: "aperta quadra"]            	# 	(en: 'open bracket', google translation)
        else: [T: "aperta parentesi quadra"]         	# 	(en: 'left bracket', MathPlayer: 'abre corchetes', google: 'soporte izquierdo')
 - "\\": [T: "aperta parentesi quadra"]              	#  0x5c	(en: 'back slash', MathPlayer: 'abre corchetes', google: 'back slash')
 - "]":                                         	#  0x5d
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then: [T: "chiusa quadra"]          	# 	(en: 'close bracket', google translation)
        else: [T: "chiusa parentesi quadra"]           	# 	(en: 'right bracket', MathPlayer: 'cierra corchetes', google: 'soporte derecho')
 - "^": [T: "accento circonflesso"]                      	#  0x5e	(en: 'hat')
 - "_": [T: "sottolineato"]                        	#  0x5f	(en: 'under bar')
 - "`": [T: "accento grave"]                     	#  0x60	(en: 'grave')
 - "{":                                         	#  0x7b
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then: [T: "aperta graffa"]         	# 	(en: 'open brace', google translation)
        else: [T: "aperta parentesi graffa"]            	# 	(en: 'left brace', MathPlayer: 'abre llaves', google: 'abrazadera izquierda')
 - "|":                                         	#  0x7c
    # note: for ClearSpeak and SimpleSpeak, "|" inside of sets is handled at the mrow level, same for 'sets'
     - test:
        - if: "$SpeechStyle != 'ClearSpeak' or not(preceding-sibling::*) or not(following-sibling::*)"
          then: [T: "barra verticale"]           	# 	(en: 'verticale line', google translation)
        - else_if: "$ClearSpeak_VerticalLine = 'SuchThat'"
          then: [T: "tale che"]                  	# 	(en: 'tale che', google translation)
        - else_if: "$ClearSpeak_VerticalLine = 'Given'"  
          then: [T: "dato"]                     	# 	(en: 'given', google translation)
        - else: [T: "barra verticale"]           	# 	(en: 'divides')

 - "}":                                         	#  0x7d
    - test:
        if: $SpeechStyle = 'ClearSpeak' or $SpeechStyle = 'SimpleSpeak'
        then: [T: "chiusa graffa"]          	# 	(en: 'close brace', google translation)
        else: [T: "chiusa parentesi graffa"]             	# 	(en: 'right brace', MathPlayer: 'cierra llaves', google: 'abrazadera derecha')

 - "~": [T: "tilde"]                            	#  0x7e
 - " ":                                         	#  0xa0
    - test:
        if: "@data-empty-in-2D"
        then: [T: "vuoto"]                      	#  want to say something for fraction (etc) with empty child	(en: 'empty', google translation)
        else: [T: ""]                            

 - "¢": [T: "centesimi"]                          	#  0xa2	(en: 'cents')
 - "£": [T: "lire sterline"]                  	#  0xa3	(en: 'pounds')
 - "¬": [T: "non"]                         	#  0xac	(en: 'not')
 - "°": [T: "grado"]                            	#  0xb0	(en: 'degrees')
 - "±": [T: "più o meno"]                        	#  0xb1	(en: 'plus or minus')
 - "´": [T: "accento acuto"]                     	#  0xb4	(en: 'acute')
 - "·":                                         	#  0xB7
    - test:
        if: "$SpeechStyle != 'ClearSpeak' or $ClearSpeak_MultSymbolDot = 'Auto'"
        then_test:
            if: "$Verbosity = 'Verbose'"
            then:  [T: "moltiplicato per"]          # 	(en: 'times', google translation)
            else: [T: "per"]
        else: [T: "punto medio"]                	# 	(en: 'dot')
 - "×":                                         	#  0xd7
    - test:
        if: "$Verbosity = 'Verbose'"
        then:  [T: "moltiplicato per"]          # 	(en: 'times', google translation)
        else: [T: "per"]
 - "÷": [T: "dividido por"]                         	#  0xf7	(en: 'divided by')
 - "̀": [T: "abbellimento accento grave"]                     	#  0x300	(en: 'grave accent embellishment', google: 'embellido de acento grave')
 - "́": [T: "abbellimento accento acuto"]                     	#  0x301	(en: 'acute accent embellishment', google: 'embellido de acento agudo')
 - "̂": [T: "abbellimento accento circonflesso"]                         	#  0x302	(en: 'circumflex accent embellishment', google: 'embellamiento del acento circunflejo')
 - "̃": [T: "abbellimento tilde"]                            	#  0x303	(en: 'tilde embellishment', google: 'tilde adorno')
 - "̄": [T: "abbellimento barra"]                            	#  0x304	(en: 'macron embellishment', google: 'embellido de macron')
 - "̅": [T: "abbellimento barra sopra"]                            	#  0x305	(en: 'overbar embellishment', google: 'embellido de overbar')
 - "̆": [T: "breve"]                            	#  0x306
 - "̇": [T: "abbellimento punto sopra"]            	#  0x307	(en: 'dot above embellishment', google: 'punto por encima del adorno')

   # Note: ClearSpeak has pref TriangleSymbol for "Δ", but that is wrong
 - "Α-Ω": 
    - test: 
        if: "$CapitalLetters_Beep"
        then:
        - audio:
            value: "beep.mp4"
            replace: []
    - test: 
        if: "$CapitalLetters_UseWord"
        then_test:
          if: "$SpeechOverrides_CapitalLetters = ''"
          then_test:
            if: "$Impairment = 'Blindness'"
            then: [T: "maiuscola"]              	# 	(en: 'cap', google translation)
          else: [x: "$SpeechOverrides_CapitalLetters"] 
    - pitch:
        value: "$CapitalLetters_Pitch"
        # note: processing of ranges converts '.' into the character, so it needs to be in quotes below
        replace: [spell: "translate('.', 'ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡ΢ΣΤΥΦΧΨΩ', 'αβγδεζηθικλμνξοπρςστυφχψω')"]

 - "α": [T: "alfa"]                             	#  0x3b1	(en: 'alpha')
 - "β": [T: "beta"]                             	#  0x3b2
 - "γ": [T: "gamma"]                            	#  0x3b3	(google: 'gama')
 - "δ": [T: "delta"]                            	#  0x3b4
 - "ε": [T: "épsilon"]                          	#  0x3b5	(en: 'epsilon', google: 'epsilon')
 - "ζ": [T: "zeta"]                             	#  0x3b6
 - "η": [T: "eta"]                              	#  0x3b7
 - "θ": [T: "theta"]                            	#  0x3b8
 - "ι": [T: "iota"]                             	#  0x3b9
 - "κ": [T: "kappa"]                            	#  0x3ba
 - "λ": [T: "lambda"]                           	#  0x3bb
 - "μ": [T: "my"]                               	#  0x3bc	(en: 'mu', google: 'mu')
 - "ν": [T: "ny"]                               	#  0x3bd	(en: 'nu', google: 'nu')
 - "ξ": [T: "xi"]                               	#  0x3be	(en: 'zai', google: 'zai')
 - "ο": [T: "ómicron"]                          	#  0x3bf	(en: 'omicron', google: 'omicron')
 - "π": [T: "pi"]                               	#  0x3c0
 - "ρ": [T: "rho"]                              	#  0x3c1
 - "ς": [T: "sigma final"]                      	#  0x3c2	(en: 'final sigma', google: 'final sigma')
 - "σ": [T: "sigma"]                            	#  0x3c3
 - "τ": [T: "tau"]                              	#  0x3c4
 - "υ": [T: "ípsilon"]                          	#  0x3c5	(en: 'upsilon', google: 'upsilon')
 - "φ": [T: "phi"]                              	#  0x3c6	(google: 'fi')
 - "χ": [T: "chi"]                               	#  0x3c7	(en: 'chi', google: 'chi')
 - "ψ": [T: "psi"]                              	#  0x3c8
 - "ω": [T: "omega"]                            	#  0x3c9
 - "ϕ": [T: "fi"]                        	#  0x3d5	(en: 'phi', google: 'fi')
 - "ϖ": [T: "variante di fi"]                   	#  0x3d6	(en: 'pi', google: 'pi')
 - "ϵ": [T: "variante di épsilon"]              	#  0x3f5	(en: 'epsilon', google: 'epsilon')
 - "϶": [T: "épsilon invertita"]                	#  0x3f6	(en: 'reversed epsilon')

 - "–": [T: "en dash"]                          	#  0x2013	(en: 'en dash')
 - "—": [T: "em dash"]                          	#  0x2014	(en: 'em dash')
 - "―": [T: "barra orizzontale"]                 	#  0x2015	(en: 'horizontal bar')
 - "‖": [T: "barra verticale doppia"]             	#  0x2016	(en: 'double vertical line')
 - "…":                                         	#  0x2026
    test:
        if:
            - "$SpeechStyle != 'ClearSpeak' or $ClearSpeak_Ellipses = 'Auto' or"
               # must be ClearSpeak and $ClearSpeak_Ellipses = 'AndSoOn'
               # speak '…' as 'and so on...' unless expr starts with '…'
            - "../*[1][.='…']"
        then: [T: "puntini di sospensione"]          	# 	(en: 'dot dot dot', google translation)
        else_test:                              	#  must have $ClearSpeak_Ellipses = 'AndSoOn'
            if: "count(following-sibling::*) = 0"
            then: [T: "e così via"]               	# 	(en: 'and so on', google translation)
            else: [T: "puntini di sospensione"]     	# 	(en: 'and so on up to', MathPlayer: 'punto punteado punteado', google: 'y así sucesivamente')

 - "⁡":                                          # 0x2061
    - test:
        # skip saying "of" when Terse and a trig function, when it is a shape (does this happen?), or we are in :literal mode
        if: "not(
              ( $Verbosity='Terse' or ($SpeechStyle = 'ClearSpeak' and IsNode(following-sibling::*[1],'simple')) and
                preceding-sibling::*[1][IfThenElse($SpeechStyle='ClearSpeak',
                                                   IsInDefinition(., 'ClearSpeakTrigFunctionNames'),
                                                   IsInDefinition(., 'TrigFunctionNames') )]
              ) or
              preceding-sibling::*[1][IsInDefinition(., 'GeometryShapes')] or
              (@data-changed='added' and ancestor-or-self::*[contains(@data-intent-property, ':literal:')])
            )"
        then: [T: "di"]                         	# 	(en: 'of', google translation)
 - "⁢": [T: ""]                                 	#  0x2062
 - "⁣": [T: ""]                                 	#  0x2063
 - "⁤": [T: "più"]                              	#  0x2064	(en: 'and', google: 'y')
 - "′": [T: "primo"]                            	#  0x2032	(en: 'prime')
 - "″": [T: "doppio primo"]                        	#  0x2033	(en: 'double prime', MathPlayer: 'segunda', google: 'doble primo')
 - "‴": [T: "triplo primo"]                       	#  0x2034	(en: 'triple prime', MathPlayer: 'tercera', google: 'triple prime')
 - "‵": [T: "primo inverso"]                     	#  0x2035	(en: 'reversed prime')
 - "‶": [T: "doppio primo inverso"]               	#  0x2036	(en: 'reversed double prime')
 - "‷": [T: "triplo primo inverso"]                  	#  0x2037	(en: 'reversed triple prime', google: 'triple prime invertido')

 - "ℂℕℚℝℤ":                                     	#  here we rely on this running through the table again to speak "cap xxx"
    - T: "prima inversa"                      	# 	(en: 'double-struck', google: 'doble golpe')
    - spell: "translate('.', 'ℂℕℚℝℤ', 'CNQRZ')"

 - "℃": [T: "gradi Celsius"]               	#  0x2103	(en: 'degrees celsius', google: 'grados celsius')
 - "℉": [T: "gradi Fahrenheit"]                	#  0x2109	(en: 'degrees fahrenheit')
 - "ℋℛℓ":                                       	#  0x210b
    - T: "gradi Fahrenheit"                    	# 	(en: 'script', google: 'guion')
    - spell: "translate('.', 'ℋℛℓ', 'HRl')"
 - "ℎ": [T: "constante de Planck"]              	#  0x210e	(en: 'planck constant', MathPlayer: 'constante de Planck', google: 'planck constante')
 - "ℜ":                                         	#  0x211c
    - T: "r maiuscola gotica"                  	# 	(en: 'fraktur', google: 'fraktur')
    - spell: "'R'"

 - "Ω": [T: "hom"]                            	#  0x2126	(en: 'ohms')
 - "K": [T: "gradi Kelvin"]                    	#  0x212a	(en: 'kelvin')
 - "Å": [T: "angstrom"]                         	#  0x212b	(en: 'angstroms')
 - "ⅆⅇⅈⅉ":                                      	#  0x2146-9
    - T: "angstrom"                             	# 	(en: 'double-struck italic')
    - spell: "translate('.', 'ⅆⅇⅈⅉ', 'deij')"

 - "←": [T: "freccia sinistra"]                 	#  0x2190	(en: 'leftwards arrow')
 - "↑": [T: "freccia in alto"]                    	#  0x2191	(en: 'upwards arrow')
 - "→":                                         	#  0x2192
     - test:
        if: "ancestor::*[2][self::m:limit]"
        then: [T: "tendente a"]                   	# 	(en: 'approaches', google translation)
        else: [T: "freccia destra"]             	# 	(en: 'right arrow', MathPlayer: 'flecha', google: 'flecha correcta')

 - "↓": [T: "freccia in basso"]                     	#  0x2193	(en: 'downwards arrow')
 - "⇒": [T: "doppia freccia a destra"]                     	#  0x21d2	(en: 'rightwards double arrow')
 - "∀": [T: "per ogni"]                        	#  0x2200	(en: 'for all')
 - "∂":                                         	#  0x2202
     - test: 
         if: "$Verbosity='Terse'"
         then: [T: "parziale"]                   	# 	(en: 'partial', google translation)
         else: [T: "derivata parziale"]          	# 	(en: 'partial derivative')
 - "∃": [T: "esiste"]                           	#  0x2203	(en: 'there exists')
 - "∄": [T: "non esiste"]                        	#  0x2204	(en: 'there does not exist')
 - "∅": [T: "insieme vuoto"]                   	#  0x2205	(en: 'empty set')
 - "∆":                                         	#  0x2206
     - test: 
         if: "$Verbosity!='Terse'"
         then: [T: "l'"]                        	# 	(en: 'the', google translation)
     - T: "incremento"                          	# 	(en: 'laplacian of')
 - "∈":                                         	#  0x2208
     - test:
        if: "$SpeechStyle != 'ClearSpeak'"
        then: [T: "un elemento di"]             	# 	(en: 'an element of', google translation)
        # Several options for speaking elements in ClearSpeak -- they split between being inside a set or not and then the option
        else_test:
            if: "../../self::m:set or ../../../self::m:set"	#  inside a set
            then_test:
              - if: $ClearSpeak_SetMemberSymbol = 'Auto' or $ClearSpeak_SetMemberSymbol = 'In'
                then: [T: "in"]                 	# 	(en: 'in', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Member'
                then: [T: "membro di"]         	# 	(en: 'member of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Element'
                then: [T: "elemento di"]        	# 	(en: 'element of', google translation)
              - else: [T: "appartiene a"]    	#  $ClearSpeak_SetMemberSymbol = 'Belongs'	(en: 'belonging to')
            else_test:
              - if: $ClearSpeak_SetMemberSymbol = 'Auto' or $ClearSpeak_SetMemberSymbol = 'Member'
                then: [T: "è un membro di"]      	# 	(en: 'is a member of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Element'
                then: [T: "è un elemento di"]  	# 	(en: 'is an element of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'In'
                then: [T: "è in"]              	# 	(en: 'is in', google translation)
              - else: [T: "appartiene a"]    	#  $ClearSpeak_SetMemberSymbol = 'Belongs'	(en: 'belongs to')
 - "∉":                                         	#  0x2209
    # rule is identical to 0x2208
     - test:
        if: "$SpeechStyle != 'ClearSpeak'"
        then: [T: "non è un elemento di"]       	# 	(en: 'is not an element of', google translation)
        # Several options for speaking elements in ClearSpeak -- they split between being inside a set or not and then the option
        else_test:
            if: "../../self::m:set or ../../../self::m:set"	#  inside a set
            then_test:
              - if: $ClearSpeak_SetMemberSymbol = 'Auto' or $ClearSpeak_SetMemberSymbol = 'In'
                then: [T: "non è in"]              	# 	(en: 'not in', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Member'
                then: [T: "non è un membro di"]      	# 	(en: 'not member of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Element'
                then: [T: "non è un elemento di"]     	# 	(en: 'not element of', google translation)
              - else: [T: "non appartiene a"] 	#  $ClearSpeak_SetMemberSymbol = 'Belongs'	(en: 'not belonging to')
            else_test:
              - if: $ClearSpeak_SetMemberSymbol = 'Auto' or $ClearSpeak_SetMemberSymbol = 'Member'
                then: [T: "non è un membro di"]   	# 	(en: 'is not a member of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Element'
                then: [T: "non è un elemento di"]	# 	(en: 'is not an element of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'In'
                then: [T: "non è incluso in"]     	# 	(en: 'is not in', google translation)
              - else: [T: "non appartiene a"] 	#  $ClearSpeak_SetMemberSymbol = 'Belongs'	(en: 'does not belong to')
 - "∊":                                         	#  0x220a
     - test:
        if: "$SpeechStyle != 'ClearSpeak'"
        then: [T: "è un elemento di"]          	# 	(en: 'is an element of', google translation)
        # Several options for speaking elements in ClearSpeak -- they split between being inside a set or not and then the option
        else_test:
            if: "../../self::m:set or ../../../self::m:set"	#  inside a set
            then_test:
              - if: $ClearSpeak_SetMemberSymbol = 'Auto' or $ClearSpeak_SetMemberSymbol = 'In'
                then: [T: "in"]                 	# 	(en: 'in', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Member'
                then: [T: "membro di"]         	# 	(en: 'member of', google translation)
              - else_if: $ClearSpeak_SetMemberSymbol = 'Element'
                then: [T: "elemento di"]        	# 	(en: 'element of', google translation)
              - else: [T: "appartiene a"]    	#  $ClearSpeak_SetMemberSymbol = 'Belongs'	(en: 'belonging to')
