---
- include: "../../definitions.yaml"
# Lines starting with "#" are a comment
# Each definition in this file is of the form
# - name: { "...", "..." "..." }
# For numbers, 
# - name: [] "...", "..." "..." ]


# If an "intent" is used, the 'terse:medium:verbose' speech for the intent name is given here for a prefix||infix||postfix||function fixity
# If only one ":" is used, it the first part is used for 'terse' and the second part is used for 'medium' and 'verbose'
# If no ":"s are used, the same speech is used for all forms
# If bracketing words make sense, they are separated with ";"s
# Intent mappings must specify whether they are "prefix", "infix", "postfix", or "function" with an "=" sign
# If there are multiple fixities (e.g., see transpose), they are separated with "||
#   for readability, spaces can be used around any of the delimiter characters
# Note: if there are multiple fixities, the first one is used if the fixity is not given in the intent
- IntentMappings: {
    "indexed-by": "infix= ; pedice; fine pedice",
    "modified-variable": "silent= ",
    "say-super": "infix=apice",   # used with 'mo' for superscripts (e.g, "<")
    "skip-super": "silent=",   # used with 'mo' for superscripts (e.g, "*")

    "absolute-value": "function= ; valore assoluto: il valore assoluto di: il valore assoluto di; fine valore assoluto",
    "binomial": "infix=binomiale; scegliere; fine binomiale",
    "limit": "prefix=límite per",
    "lim-sup": "prefix=lim sup per: il limite superiore per: il limite superiore per",
    "lim-inf": "prefix=lim inf per: il limite inferiore per : il limite inferiore per",
    "logarithm-with-base": "prefix=log base: il logaritmo in base: il log in base",
    "minus": "infix=meno || prefix=meno",
    "plus": "infix=più || prefix=più",

    "transpose": "postfix=trasposta || function=trasposta",
    "norm": "function=; regola: regola: la regola; fine regola",
    "trace": "function=;traccia : traccia di: la traccia di; fine traccia",
    "dimension": "function=; dimensióne : dimensióne di: la dimensióne di; fine dimensióne",
    "homomorphism": "function= ; omomorfismo : omomorfismo di: l'omomorfismo di; fine omomorfismo",
    "kernel": "function= ; nucleo : nucleo di: il nucleo di; fine nucleo",
    "vector": "function= ; vettore || prefix=vettore",
    "cross-product": "infix=vettoriale: prodotto vettoriale: prodotto vettoriale",
    "dot-product": "infix=scalare: prodotto scalare: dot:prodotto scalare",

    "divergence": "function= ; div: divergenza: divergenza; fine divergenza",
    "curl": "function= ; rotore; fine rotore",
    "gradient": "function= ; grad: gradiente: gradiente; fine gradiente",
    "laplacian": "function=laplaciano",   

    "chemistry-concentration": "function= ; concentrazione: concentrazione di: la concentrazione di; fine concentrazione",
  }

- NavigationParts: {
    "large-op": "base; lower limit; upper limit",
    "mfrac": "numerator;denominator",
    "fraction": "numerator;denominator",
    "msqrt": "root",
    "square-root": "root",
    "mroot": "root;root index",
    "root": "root;root index",
    "msub": "base;subscript",
    "sub": "base;subscript",
    "msup": "base;superscript",
    "say-super": "base;superscript",
    "skip-super": "base;superscript",
    "power": "base;exponent",
    "msubsup": "base;subscript;superscript",
    "munder": "base;under limit",
    "mover": "base;upper limit",
    "munderover": "base;under limit;upper limit",

    # words for moving into and out of one of the parts (e.g., "move right 'out of' numerator, 'in' denominator")
    # it's a hack to put them here, but at least they are grouped with the other navigation parts
    "in": "in",
    "out": "fuori da",
  }

- SIPrefixes: {
    "Q": "quetta", "R": "ronna", "Y": "yotta", "Z": "zetta", "E": "exa", "P": "peta", "T": "tera", "G": "giga", "M": "mega", "k": "kilo", "h": "etto", "da": "deca",
    "d": "deci", "c": "centi", "m": "milli", "µ": "micro", "n": "nano", "p": "pico", "f": "femto", "a": "atto", "z": "zepto", "y": "yocto", "r": "ronto", "q": "quetto"
  }

# this is a list of all units that accept SIPrefixes
# from www.bipm.org/documents/20126/41483022/SIBrochure-9-EN.pdf
#   Prefixes may be used with any of the 29 SI units with special names
#   The SI prefixes can be used with several of accepted units, but not, for example, with the non-SI units of time.
- SIUnits: {
    # base units
    "A": "ampere",
    "cd": "candela",
    "K": "grado kelvin", "K": "kelvin", # U+212A
    "g": "grammo",
    "m": "metro",    
    "mol": "mol",
    "s": "secondo", "sec": "secondo",  # "sec" not actually legal

    # derived units
    "Bq": "becquerel",
    "C": "coulomb",
    "°C": "grado Celsius", "℃": "grado Celsius",  # should only take negative powers
    "F": "farad",
    "Gy": "gray",
    "H": "henry",
    "Hz": "hertz",
    "J": "joule",
    "kat": "katal",
    "lm": "lumen",
    "lx": "lux",
    "N": "newton",
    "Ω": "ohm", "Ω": "ohm",       # Greek Cap letter, U+2126 OHM SIGN
    "Pa": "pascal",
    "S": "siemens",
    "Sv": "sievert",
    "T": "tesla",
    "V": "volt",
    "W": "watt",
    "Wb": "weber",

    # accepted (plus a few variants) that take SI prefixes
    "l": "litro", "L": "litro", "ℓ": "litro", # Should only take negative powers; British spelling works for US also
    "t": "tonnellata",             # should only take positive powers
    "Da": "dalton",
    "Np": "neper",               # should only take negative powers
    "u": "unità di massa atomica",     # 'u' is correct: https://en.wikipedia.org/wiki/Dalton_(unit)
    "eV": "elettronvolt",
    "rad": "radiante",             # should only take negative powers
    "sr": "stereoradiante",      # should only take negative powers

    # others that take a prefix
    "a": "anno",                 # should only take positive powers
    "as": "secondo d'arco",    # see en.wikipedia.org/wiki/Minute_and_second_of_arc

    # technically wrong, but used in practice with SI Units (and only positive powers)
    "b": "bit",                 # should only take positive powers
    "B": "byte",                # should only take positive powers
    "Bd": "baud",             # should only take positive powers
  }


- UnitsWithoutPrefixes: {
    # time
    "″": "secondo", "\"": "secondo", 
    "′": "minuto", "'": "minuto","min": "minuto",
    "h": "ora", "hr": "ora", "Hr": "ora",
    "d": "giorno", "dy": "giorno",
    "w": "settimana", "wk": "settimana",
    "y": "anno", "yr": "anno",    

    # angles
    "°": "grado", "deg": "grado", # should only take negative powers
    "arcmin": "minuto d'arco",
    "amin": "minuto d'arco",
    "am": "minuto d'arco",
    "MOA": "minuto d'arco",
    "arcsec": "secondo d'arco",
    "asec": "secondo d'arco",

    # distance
    "au": "unità astronomica", "AU": "unità astronomica",
    "ltyr": "anno luce", "ly": "anno luce",
    "pc": "parsec",
    "Å": "angstrom", "Å": "angstrom",           # U+00C5 and U+212B
    "fm": "fermi",

    # others
    "ha": "ettaro",
    # "B": "bel",    # "B" more commonly means bytes
    "dB": "decibel", # already logarithmic, so not used with SI prefixes

    "atm": "atmosfera",
    "amu": "unità di massa atomica",
    "bar": "bar",
    "cal": "caloria",
    "Ci": "curio",
    "grad": "gradiente",
    "M": "molare",
    "R": "roentgen",
    "rpm": "giri al minuto",
    "℧": "mho",
    "dyn": "dina",
    "erg": "erg",

    # special case overrides because prefixes with the base "metro" all get accents
    "Qm": "quettametro", "Rm": "ronnametro", "Ym": "yottametro", "Zm": "zettametro", "Em": "exametro", "Pm": "petametro",
      "Tm": "terametro", "Gm": "gigametro", "Mm": "megametro", "km": "chilometro", "hm": "ettometro", "dam": "decametro",
    "dm": "decimetro", "cm": "centimetro", "mm": "millimetro", "µm": "micrometro", "nm": "nanometro", "pm": "picometro",
    #  conflicts: "fm": "femtómetro", "am": "attómetro",
    "zm": "zeptómetro", "ym": "yoctómetro", "rm": "rontómetro", "qm": "quectómetro",
  
    # powers of 2 used with bits and bytes
    "Kib": "kibibit", "Mib": "mebibit", "Gib": "gibibit", "Tib": "tebibit", "Pib": "pebibit", "Eib": "exbibit", "Zib": "zebibit", "Yib": "yobibit",
    "KiB": "kibibyte", "MiB": "mebibyte", "GiB": "gibibyte", "TiB": "tebibyte", "PiB": "pebibyte", "EiB": "exbibyte", "ZiB": "zebibyte", "YiB": "yobibyte",
  }


  # this will only be used if the language is English, so it can be empty for other countries
