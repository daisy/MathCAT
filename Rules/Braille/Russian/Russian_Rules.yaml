  - Postscripts: "*[position()>1 and position() < (last() + ($NumChildren mod 2) - count($Prescripts))]"
  replace:
  - test:
      if: "$Prescripts"
      then:
      - test:
          if: "not($Prescripts[1][self::m:none])"
          then:
          - t: "⠡"
          - test:
            - if: "$Prescripts[1][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Prescripts[1], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Prescripts[1]"
          - test:
              if: "not($Prescripts[1][self::m:mn and translate(., '0123456789', '')='']) and not($Prescripts[1][.='∞'])"
              then: [t: "⠱"]
      - test:
          if: "not($Prescripts[2][self::m:none])"
          then:
          - t: "⠌"
          - test:
            - if: "$Prescripts[2][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Prescripts[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Prescripts[2]"
          - test:
              if: "not($Prescripts[2][self::m:mn and translate(., '0123456789', '')='']) and not($Prescripts[2][.='∞'])"
              then: [t: "⠱"]
  - x: "*[1]"
  - test:
      if: "$Postscripts"
      then:
      - test:
          if: "not($Postscripts[1][self::m:none])"
          then:
          - t: "⠡"
          - test:
            - if: "$Postscripts[1][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Postscripts[1], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Postscripts[1]"
          - test:
              if: "not($Postscripts[1][self::m:mn and translate(., '0123456789', '')='']) and not($Postscripts[1][.='∞'])"
              then: [t: "⠱"]
      - test:
          if: "not($Postscripts[2][self::m:none])"
          then:
          - t: "⠌"
          - test:
            - if: "$Postscripts[2][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Postscripts[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Postscripts[2]"
