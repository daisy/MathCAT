    - if: ".='-' or .=':'"
      then: [t: "⠤"]
    - else_if: ".='=' or .='∷'"
      then: [t: "⠦"]
    - else_if: ".='≡'"
      then: [t: "⠿"]
      else: [x: "text()"]

-
  name: chemical-reaction-operator
  tag: mo
