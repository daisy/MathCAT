---
# Russian mathematical braille rules.

-
  name: whitespace
  tag: "!*"
  match: "not(self::m:math) and not($MatchingWhitespace) and (@data-previous-space-width >= 0.25 or @data-following-space-width >= 0.25)"
  replace:
  - with:
      variables: [MatchingWhitespace: "true()"]
      replace:
      - test:
        - if: "@data-previous-space-width > 1.1"
          then: [t: "⠀"]
        - else_if: "@data-previous-space-width >= 0.25"
          then: [t: "W"]
      - x: "."
      - test:
        - if: "@data-following-space-width > 1.1"
          then: [t: "⠀"]
        - else_if: "@data-following-space-width >= 0.25"
          then: [t: "W"]

-
  name: omission-intent
  tag: "!*"
  match: "contains(@intent, ':blank')"
  replace: [t: "⠀"]

-
  name: omitted-digit-in-number
  tag: mrow
  match:
  - "count(*)=3 and"
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][contains(@intent, ':blank')] and"
  - "*[3][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - t: "⠬"
  - x: "BrailleChars(translate(*[3], '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"

-
  name: unicode-override
  tag: "*"
  match: "@data-unicode"
  replace: [x: "@data-unicode"]

-
  name: default
  tag: math
  match: "."
  variables:
  - RowStart: "''"
  - RowEnd: "''"
  - InSystemLeftBrace: "false()"
  - InChemElementGroup: "false()"
  - InColumnArithmetic: "false()"
  - MatchingWhitespace: "false()"
  replace: [x: "*"]

-
  name: system-left-brace-opener
  tag: mo
  match: "not(preceding-sibling::*) and following-sibling::*[1][self::m:mtable] and count(../*)=2"
  replace: [t: ""]

-
  name: chemistry-single-letter-element-group
  tag: mrow
  match:
  - "(@data-chem-formula or ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "count(*[not(self::m:mo[.='⁡' or .='⁢' or .='⁣' or .='⁤'])]) > 1 and"
  - "count(*[not(self::m:mo[.='⁡' or .='⁢' or .='⁣' or .='⁤'])]) = count(*[self::m:mi[@data-chem-element='1']])"
  replace:
  - t: "⠸"
  - with:
      variables: [InChemElementGroup: "true()"]
      replace: [x: "*"]

-
  name: canonical-prefix-geometry-op
  tag: mrow
  match:
  - "count(*)=3 and"
  - "*[1][(self::m:mo or self::m:mi) and (.='∠' or .='△' or .='∪')] and"
  - "*[2][self::m:mo and .='⁡']"
  replace:
  - test:
    - if: "*[1][.='∪']"
      then: [t: "⠸⠜"]
    - else:
      - x: "*[1]/text()"
  - t: "#"
  - x: "*[3]"

-
  name: geometry-prefix-after-canonical-multiplier
  tag: mrow
  match:
  - "count(*)=3 and"
  - "*[2][self::m:mo and (.='⁢' or .='⁤')] and"
  - "*[3][self::m:mrow and *[1][(self::m:mo or self::m:mi) and (.='∠' or .='△' or .='∪')]]"
  replace:
  - x: "*[1]"
  - t: "⠄"
  - x: "*[3]"

-
  name: periodic-decimal-row
  tag: mrow
  match:
  - "count(*)=4 and"
  - "*[1][self::m:mn and contains(., ',') and translate(., '0123456789,', '')=''] and"
  - "*[2][self::m:mo and .='('] and"
  - "*[3][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[4][self::m:mo and .=')']"
  replace:
  - x: "*[1]"
  - t: "⠣"
  - x: "BrailleChars(translate(string(*[3]), '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"
  - t: "⠜"

-
  name: mixed-number-simple-fraction-with-invisible-times
  tag: mrow
  match:
  - "count(*)=3 and"
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mo and (.='⁢' or .='⁤')] and"
  - "*[3][self::m:mfrac] and"
  - "*[3]/*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[3]/*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - t: "#"
  - x: "*[3]"

-
  name: mixed-number-simple-fraction
  tag: mrow
  match:
  - "count(*)=2 and"
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mfrac] and"
  - "*[2]/*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2]/*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - t: "#"
  - x: "*[2]"

-
  name: mixed-number-with-arithmetic-fraction-with-invisible-times
  tag: mrow
  match:
  - "count(*)=3 and"
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mo and (.='⁢' or .='⁤')] and"
  - "*[3][self::m:mfrac] and"
  - "not(*[3]/*[1][self::m:mn and translate(., '0123456789', '')=''] and *[3]/*[2][self::m:mn and translate(., '0123456789', '')=''])"
  replace:
  - x: "*[1]"
  - t: "⠐"
  - x: "*[3]"

-
  name: mixed-number-with-arithmetic-fraction
  tag: mrow
  match:
  - "count(*)=2 and"
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mfrac] and"
  - "not(*[2]/*[1][self::m:mn and translate(., '0123456789', '')=''] and *[2]/*[2][self::m:mn and translate(., '0123456789', '')=''])"
  replace:
  - x: "*[1]"
  - t: "⠐"
  - x: "*[2]"

-
  name: default
  tag: [mrow, mstyle, semantics]
  match: "."
  replace: [x: "*[1] | *[position()>1]"]

-
  name: mspace
  tag: mspace
  match: "@linebreak='newline' or @linebreak='indentingnewline'"
  replace:
  - test:
    - if: "string(@width) != '' or @data-previous-space-width >= 0.25 or @data-following-space-width >= 0.25"
      then: [t: "⠠"]
    - else: [t: "⠐"]

-
  name: mspace
  tag: mspace
  match: "."
  replace: [t: "W"]

-
  name: no-content
  tag: [math, mrow]
  match: "not(*)"
  replace: [t: "⠀"]

-
  name: default
  tag: msqrt
  match: "."
  replace:
  - t: "⠩⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: default
  tag: mroot
  match: "not(*[2][self::m:mn and translate(., '0123456789', '')=''])"
  replace:
  - t: "⠩"
  - x: "*[2]"
  - t: "⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: integer-index
  tag: mroot
  match: "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - t: "⠩"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
  - t: "⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: nested-fraction
  tag: mfrac
  match: "parent::m:mfrac"
  replace:
  - t: "⠆"
  - x: "*[1]"
  - t: "⠀⠳"
  - x: "*[2]"
  - t: "⠰"

-
  name: simple-numeric
  tag: mfrac
  match:
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: simple-algebraic-negative-integer-denominator
  tag: mfrac
  match:
  - "(*[1][self::m:mi] or *[1][self::m:mn and translate(., '0123456789,', '')='']) and"
  - "*[2][self::m:mrow and count(*)=2 and *[1][self::m:mo and (.='-' or .='−')] and *[2][self::m:mn and translate(., '0123456789', '')='']]"
  replace:
  - x: "*[1]"
  - t: "⠳⠤"
  - x: "BrailleChars(translate(*[2]/*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: simple-algebraic-negative-decimal-denominator
  tag: mfrac
  match:
  - "(*[1][self::m:mi] or *[1][self::m:mn and translate(., '0123456789,', '')='']) and"
  - "*[2][self::m:mrow and count(*)=2 and *[1][self::m:mo and (.='-' or .='−')] and *[2][self::m:mn and contains(., ',') and translate(., '0123456789,', '')='']]"
  replace:
  - x: "*[1]"
  - t: "⠳⠤"
  - x: "*[2]/*[2]"

-
  name: simple-algebraic
  tag: mfrac
  match:
  - "(*[1][self::m:mi] or *[1][self::m:mn and translate(., '0123456789,', '')='']) and"
  - "(*[2][self::m:mi] or *[2][self::m:mn and translate(., '0123456789,', '')=''])"
  replace:
  - x: "*[1]"
  - t: "⠳"
  - test:
      if: "*[2][self::m:mn and translate(., '0123456789', '')='']"
      then:
      - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      else:
      - x: "*[2]"

-
  name: default
  tag: mfrac
  match: "."
  replace:
  - t: "⠆"
  - x: "*[1]"
  - t: "⠀⠳"
  - x: "*[2]"
  - t: "⠰"

-
  name: binomial-frac
  tag: mrow
  match: "IsBracketed(., '(', ')') and *[2][self::m:mfrac][@linethickness=0]"
  replace:
  - x: "*[1]"
  - t: "⠨⠉⠡"
  - x: "*[2]/*[2]"
  - t: "⠌"
  - x: "*[2]/*[1]"
  - x: "*[3]"

-
  name: binomial-table
  tag: mrow
  match: "IsBracketed(., '(', ')') and *[2][self::m:mtable][count(*)=2 and count(*[1])=1] and contains(@intent, 'binomial(')"
  replace:
  - x: "*[1]"
  - t: "⠨⠉⠡"
  - x: "*[2]/*[2]/*[1]/*[1]"
  - t: "⠌"
  - x: "*[2]/*[1]/*[1]/*[1]"
  - x: "*[3]"

-
  name: column-arithmetic-table
  tag: mtable
  variables:
  - InColumnArithmetic: "true()"
  - RowStart: "''"
  - RowEnd: "''"
  match: "contains(@intent, ':column-arithmetic')"
  replace: [x: "*"]

-
  name: system-left-brace-table
  tag: mtable
  variables:
  - InSystemLeftBrace: "true()"
  - RowStart: "''"
  - RowEnd: "''"
  match: "not(following-sibling::*) and count(../*)=2"
  replace: [x: "*"]

-
  name: default-matrix
  tag: mrow
  variables:
  - RowStart: "*[1]"
  - RowEnd: "*[3]"
  match:
  - "*[2][self::m:mtable] and"
  - (IsBracketed(., '(', ')') or IsBracketed(., '[', ']') or IsBracketed(., '|', '|'))
  replace: [x: "*[2]"]

-
  name: default
  tag: mtable
  match: "."
  replace: [x: "*"]

-
  name: default
  tag: [mtr, mlabeledtr]
  match: "."
  replace:
  - test:
      if: "preceding-sibling::*"
      then: [t: "⠨⠳"]
  - test:
    - if: "$InSystemLeftBrace and not(preceding-sibling::*)"
      then: [t: "⠏⠀"]
    - else_if: "$InSystemLeftBrace and not(following-sibling::*)"
      then: [t: "⠧⠀"]
    - else_if: "$InSystemLeftBrace"
      then: [t: "⠇⠀"]
    - else:
      - x: $RowStart
  - test:
      if: .[self::m:mlabeledtr]
      then:
      - t: "⠍⠑⠞⠅⠁⠀⠎⠞⠗⠕⠅⠊⠀⠲"
      - x: "*[1]/*"
      - t: "W"
  - test:
      if: .[self::m:mlabeledtr]
      then: [x: "*[position()>1]"]
      else: [x: "*"]
  - x: $RowEnd

-
  name: default
  tag: mtd
  match: "."
  replace:
  - test:
      if: "*"
      then:
      - test:
          if: "preceding-sibling::*"
          then: [t: "W"]
      - x: "*"

-
  name: single-char-exceptions
  tag: msup
  match: "*[2][translate(., \"'*`ª°²³´¹º′″‴‵‶‷⁗\",'')='']"
  replace: [x: "*"]

-
  name: chemistry-mhchem-equilibrium-arrow
  tag: mover
  match:
  - "*[1][substring(., 1, 1)='↽'] and"
  - "*[2][substring(., string-length(), 1)='⇀']"
  replace:
  - t: "⠀⠒⠕⠀⠦⠶"

-
  name: chemistry-reaction-arrow-above
  tag: mover
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or @data-chem-equation-op) and"
  - "*[1][self::m:mo and translate(., '→⟶←⟵⇌⥂⥄↑↓', '')='']"
  replace:
  - x: "*[1]"
  - t: "⠨⠌"
  - x: "*[2]"
  - t: "⠱"

-
  name: chemistry-reaction-arrow-below
  tag: munder
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or @data-chem-equation-op) and"
  - "*[1][self::m:mo and translate(., '→⟶←⟵⇌⥂⥄↑↓', '')='']"
  replace:
  - x: "*[1]"
  - t: "⠨⠡"
  - x: "*[2]"
  - t: "⠱"

-
  name: chemistry-reaction-arrow-above-and-below
  tag: munderover
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or @data-chem-equation-op) and"
  - "*[1][self::m:mo and translate(., '→⟶←⟵⇌⥂⥄↑↓', '')='']"
  replace:
  - x: "*[1]"
  - t: "⠨⠡"
  - x: "*[2]"
  - t: "⠱"
  - t: "⠨⠌"
  - x: "*[3]"
  - t: "⠱"

-
  name: vector-arrow
  tag: mover
  match:
  - "*[2][translate(., '→⟶⇀⃗', '')=''] and"
  - "string-length(translate(normalize-space(*[1]), ' ', '')) > 0"
  replace:
  - x: "*[1]"
  - test:
      if: "string-length(translate(normalize-space(*[1]), ' ', '')) > 1"
      then: [t: "⠨⠒⠂"]
      else: [t: "⠒⠂"]

-
  name: vector-bar
  tag: mover
  match:
  - "*[2][translate(., '¯‾_￣', '')=''] and"
  - "string-length(translate(normalize-space(*[1]), ' ', '')) > 0"
  replace:
  - x: "*[1]"
  - test:
      if: "string-length(translate(normalize-space(*[1]), ' ', '')) > 1"
      then: [t: "⠨⠒"]
      else: [t: "⠒"]

-
  name: geometry-arc
  tag: mover
  match: "*[2][translate(., '⌒⏜︵', '')='']"
  replace:
  - t: "⠸⠜"
  - t: "#"
  - x: "*[1]"

-
  name: exact-over-label-no-indicator
  tag: mover
  match:
  - "DefinitionValue(*[2], 'Braille', 'RussianExactOverLabelMarksWithoutIndicator') != '' and"
  - "string-length(*[2]) = 1"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianExactOverLabelMarksWithoutIndicator')"

-
  name: exact-over-label-repeated
  tag: mover
  match:
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠘"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: exact-over-label
  tag: mover
  match: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠘"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: exact-under-label-repeated
  tag: munder
  match:
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠰"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: exact-under-label
  tag: munder
  match: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠰"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: upper-right-label-no-indicator-repeated
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator') != ''"
  replace:
  - x: "*[1]"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"

-
  name: upper-right-label-no-indicator
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "DefinitionValue(*[2], 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator') != ''"
  replace:
  - x: "*[1]"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"

-
  name: upper-right-label-repeated
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - x: "*[1]"
  - t: "⠨"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
