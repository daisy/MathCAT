  name: geometry-prefix-after-multiplier
  tag: mo
  match:
  - "(.='∠' or .='△' or .='∪') and"
  - "preceding-sibling::*[1][self::m:mn] and"
  - "following-sibling::*[1][self::m:mi or self::m:msub or self::m:mrow]"
  replace:
  - t: "⠄"
  - test:
    - if: ".='∪'"
      then: [t: "⠸⠜"]
    - else:
      - x: "text()"
  - t: "#"

-
  name: prefix-geometry-ops
  tag: mo
  match:
  - "not(preceding-sibling::*) and"
  - "following-sibling::*[1][self::m:mi or self::m:msub or self::m:mrow] and"
  - "( .='∠' or .='△' or .='∪' )"
  replace:
  - test:
    - if: ".='∪'"
      then: [t: "⠸⠜"]
    - else:
      - x: "text()"
  - t: "#"

-
  name: column-arithmetic-operator
  tag: mo
  match:
  - "$InColumnArithmetic and"
  - "ancestor::m:mtr[preceding-sibling::*] and"
  - "(.='+' or .='-' or .='−' or .='×' or .='⋅' or .='·')"
  replace:
  - test:
    - if: ".='+'"
      then: [t: "⠖"]
    - else_if: ".='-' or .='−'"
      then: [t: "⠤"]
    - else: [t: "⠦"]

-
  name: column-arithmetic-result-line
  tag: mo
  match:
  - "$InColumnArithmetic and"
  - "ancestor::m:mtr[preceding-sibling::*] and"
  - ".='='"
  replace:
  - t: "⠶"

-
  name: operator-functions
  tag: mo
  match: "DefinitionValue(., 'Braille', 'RussianFunctionBraille') != ''"
  replace:
  - x: "DefinitionValue(., 'Braille', 'RussianFunctionBraille')"

-
  name: div-operator-function
  tag: mo
  match: "contains(., 'div')"
  replace:
  - t: "⠫⠙⠊⠧#"

-
  name: default
  tag: mo
  match: "."
  replace:
  - x: "text()"

-
  name: column-arithmetic-continuation-number
  tag: mn
  match:
  - "$InColumnArithmetic and"
  - "ancestor::m:mtr[preceding-sibling::*] and"
  - "translate(., '0123456789', '')=''"
  replace:
  - x: "BrailleChars(translate(., '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"

-
  name: periodic-decimal-period-digits
  tag: mn
  match:
  - "translate(., '0123456789', '')='' and"
  - "preceding-sibling::*[1][self::m:mo and .='('] and"
  - "following-sibling::*[1][self::m:mo and .=')'] and"
  - "preceding-sibling::*[2][self::m:mn and contains(., ',')]"
  replace:
  - x: "BrailleChars(translate(., '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"

-
  name: periodic-decimal
  tag: mn
  match: "contains(., ',') and substring-after(., '(') != '' and substring-before(substring-after(., '('), ')') != ''"
  replace:
  - x: "BrailleChars(substring-before(., ','), 'Russian')"
  - t: "⠂"
  - x: "BrailleChars(translate(substring-before(substring-after(., ','), '('), '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"
  - t: "⠣"
  - x: "BrailleChars(translate(substring-before(substring-after(., '('), ')'), '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"
  - t: "⠜"

-
  name: decimal-comma
  tag: mn
  match: "contains(., ',') and translate(., '0123456789,', '')=''"
  replace:
  - x: "BrailleChars(substring-before(., ','), 'Russian')"
  - t: "⠂"
  - x: "BrailleChars(translate(substring-after(., ','), '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"

-
  name: default
  tag: mn
  match: "."
  replace:
  - x: "BrailleChars(., 'Russian')"

-
  name: functions
  tag: [mi, mtext]
  match: "DefinitionValue(., 'Braille', 'RussianFunctionBraille') != ''"
  replace:
  - x: "DefinitionValue(., 'Braille', 'RussianFunctionBraille')"

-
  name: chemistry-single-letter-element-in-group
  tag: mi
  match: "$InChemElementGroup and @data-chem-element='1'"
  replace:
  - x: "translate(BrailleChars(translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', 'abcdefghijklmnopqrstuvwxyz'), 'Russian'), 'l', '')"

-
  name: div-function
  tag: [mi, mo, mtext]
  match: "contains(., 'div')"
  replace:
  - t: "⠫⠙⠊⠧#"

-
  name: default
  tag: [mi, mtext]
  match: "."
  replace:
  - x: "BrailleChars(., 'Russian')"

-
  name: default
  tag: ms
  match: "."
  replace:
  - test:
      if: "string(@lquote)!=''"
      then: [x: "@lquote"]
      else: [t: "⠦"]
  - x: "BrailleChars(., 'Russian')"
  - test:
      if: "string(@rquote)!=''"
      then: [x: "@rquote"]
      else: [t: "⠴"]

-
  name: default-children
  tag: "*"
  match: "*"
  replace:
  - x: "*"

-
  name: default-no-children
  tag: "*"
  match: "text()"
  replace:
  - x: "text()"

-
  name: default-no-text
  tag: "*"
  match: "."
  replace: [t: ""]
