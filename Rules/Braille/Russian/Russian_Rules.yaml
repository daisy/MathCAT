---
# Russian mathematical braille rules.

-
  name: whitespace
  tag: "!*"
  match: "not(self::m:math) and not($MatchingWhitespace) and (@data-previous-space-width >= 0.25 or @data-following-space-width >= 0.25)"
  replace:
  - with:
      variables: [MatchingWhitespace: "true()"]
      replace:
      - test:
        - if: "@data-previous-space-width > 1.1"
          then: [t: "⠀"]
        - else_if: "@data-previous-space-width >= 0.25"
          then: [t: "W"]
      - x: "."
      - test:
        - if: "@data-following-space-width > 1.1"
          then: [t: "⠀"]
        - else_if: "@data-following-space-width >= 0.25"
          then: [t: "W"]

-
  name: omission-intent
  tag: "!*"
  match: "contains(@intent, ':blank')"
  replace: [t: "⠀"]

-
  name: unicode-override
  tag: "*"
  match: "@data-unicode"
  replace: [x: "@data-unicode"]

-
  name: default
  tag: math
  match: "."
  variables:
  - RowStart: "''"
  - RowEnd: "''"
  - InSystemLeftBrace: "false()"
  - MatchingWhitespace: "false()"
  replace: [x: "*"]

-
  name: system-left-brace-opener
  tag: mo
  match: "not(preceding-sibling::*) and following-sibling::*[1][self::m:mtable] and count(../*)=2"
  replace: [t: ""]

-
  name: default
  tag: [mrow, mstyle, semantics]
  match: "."
  replace: [x: "*[1] | *[position()>1]"]

-
  name: no-content
  tag: [math, mrow]
  match: "not(*)"
  replace: [t: "⠀"]

-
  name: default
  tag: msqrt
  match: "."
  replace:
  - t: "⠩⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: default
  tag: mroot
  match: "not(*[2][self::m:mn and translate(., '0123456789', '')=''])"
  replace:
  - t: "⠩"
  - x: "*[2]"
  - t: "⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: integer-index
  tag: mroot
  match: "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - t: "⠩"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
  - t: "⠱"
  - x: "*[1]"
  - t: "⠹"

-
  name: nested-fraction
  tag: mfrac
  match: "parent::m:mfrac"
  replace:
  - t: "⠆"
  - x: "*[1]"
  - t: "⠀⠳"
  - x: "*[2]"
  - t: "⠰"

-
  name: simple-numeric
  tag: mfrac
  match:
  - "*[1][self::m:mn and translate(., '0123456789', '')=''] and"
  - "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: simple-algebraic
  tag: mfrac
  match:
  - "(*[1][self::m:mi] or *[1][self::m:mn and translate(., '0123456789', '')='']) and"
  - "(*[2][self::m:mi] or *[2][self::m:mn and translate(., '0123456789', '')=''])"
  replace:
  - x: "*[1]"
  - t: "⠳"
  - test:
      if: "*[2][self::m:mn]"
      then:
      - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      else:
      - x: "*[2]"

-
  name: default
  tag: mfrac
  match: "."
  replace:
  - t: "⠆"
  - x: "*[1]"
  - t: "⠀⠳"
  - x: "*[2]"
  - t: "⠰"

-
  name: binomial-frac
  tag: mrow
  match: "IsBracketed(., '(', ')') and *[2][self::m:mfrac][@linethickness=0]"
  replace:
  - x: "*[1]"
  - t: "⠨⠉⠡"
  - x: "*[2]/*[2]"
  - t: "⠌"
  - x: "*[2]/*[1]"
  - x: "*[3]"

-
  name: binomial-table
  tag: mrow
  match: "IsBracketed(., '(', ')') and *[2][self::m:mtable][count(*)=2 and count(*[1])=1] and contains(@intent, 'binomial(')"
  replace:
  - x: "*[1]"
  - t: "⠨⠉⠡"
  - x: "*[2]/*[2]/*[1]/*[1]"
  - t: "⠌"
  - x: "*[2]/*[1]/*[1]/*[1]"
  - x: "*[3]"

-
  name: system-left-brace-table
  tag: mtable
  variables:
  - InSystemLeftBrace: "true()"
  - RowStart: "''"
  - RowEnd: "''"
  match: "not(following-sibling::*) and count(../*)=2"
  replace: [x: "*"]

-
  name: default-matrix
  tag: mrow
  variables:
  - RowStart: "*[1]"
  - RowEnd: "*[3]"
  match:
  - "*[2][self::m:mtable] and"
  - (IsBracketed(., '(', ')') or IsBracketed(., '[', ']') or IsBracketed(., '|', '|'))
  replace: [x: "*[2]"]

-
  name: default
  tag: mtable
  match: "."
  replace: [x: "*"]

-
  name: default
  tag: [mtr, mlabeledtr]
  match: "."
  replace:
  - test:
      if: "preceding-sibling::*"
      then: [t: "⠨⠳"]
  - test:
    - if: "$InSystemLeftBrace and not(preceding-sibling::*)"
      then: [t: "⠏⠀"]
    - else_if: "$InSystemLeftBrace and not(following-sibling::*)"
      then: [t: "⠧⠀"]
    - else_if: "$InSystemLeftBrace"
      then: [t: "⠇⠀"]
    - else:
      - x: $RowStart
  - test:
      if: .[self::m:mlabeledtr]
      then:
      - t: "⠍⠑⠞⠅⠁⠀⠎⠞⠗⠕⠅⠊⠀⠲"
      - x: "*[1]/*"
      - t: "W"
  - test:
      if: .[self::m:mlabeledtr]
      then: [x: "*[position()>1]"]
      else: [x: "*"]
  - x: $RowEnd

-
  name: default
  tag: mtd
  match: "."
  replace:
  - test:
      if: "*"
      then:
      - test:
          if: "preceding-sibling::*"
          then: [t: "W"]
      - x: "*"

-
  name: single-char-exceptions
  tag: msup
  match: "*[2][translate(., \"'*`ª°²³´¹º′″‴‵‶‷⁗\",'')='']"
  replace: [x: "*"]

-
  name: chemistry-mhchem-equilibrium-arrow
  tag: mover
  match:
  - "*[1][substring(., 1, 1)='↽'] and"
  - "*[2][substring(., string-length(), 1)='⇀']"
  replace:
  - t: "⠀⠒⠕⠀⠦⠶"

-
  name: vector-arrow
  tag: mover
  match:
  - "*[2][translate(., '→⟶⇀⃗', '')=''] and"
  - "string-length(translate(normalize-space(*[1]), ' ', '')) > 0"
  replace:
  - x: "*[1]"
  - test:
      if: "string-length(translate(normalize-space(*[1]), ' ', '')) > 1"
      then: [t: "⠨⠒⠂"]
      else: [t: "⠒⠂"]

-
  name: vector-bar
  tag: mover
  match:
  - "*[2][translate(., '¯‾_￣', '')=''] and"
  - "string-length(translate(normalize-space(*[1]), ' ', '')) > 0"
  replace:
  - x: "*[1]"
  - test:
      if: "string-length(translate(normalize-space(*[1]), ' ', '')) > 1"
      then: [t: "⠨⠒"]
      else: [t: "⠒"]

-
  name: geometry-arc
  tag: mover
  match: "*[2][translate(., '⌒⏜︵', '')='']"
  replace:
  - t: "⠸⠜"
  - t: "#"
  - x: "*[1]"

-
  name: exact-over-label-no-indicator
  tag: mover
  match:
  - "DefinitionValue(*[2], 'Braille', 'RussianExactOverLabelMarksWithoutIndicator') != '' and"
  - "string-length(*[2]) = 1"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianExactOverLabelMarksWithoutIndicator')"

-
  name: exact-over-label-repeated
  tag: mover
  match:
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠘"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: exact-over-label
  tag: mover
  match: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠘"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: exact-under-label-repeated
  tag: munder
  match:
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠰"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: exact-under-label
  tag: munder
  match: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - test:
      if: "*[1][self::m:mrow or self::m:mfrac or self::m:msqrt or self::m:mroot or self::m:mtable]"
      then:
      - t: "⠯"
      - x: "*[1]"
      - t: "⠽"
      else:
      - x: "*[1]"
  - t: "⠰"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: upper-right-label-no-indicator-repeated
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator') != ''"
  replace:
  - x: "*[1]"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"

-
  name: upper-right-label-no-indicator
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "DefinitionValue(*[2], 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator') != ''"
  replace:
  - x: "*[1]"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianUpperRightLabelMarksWithoutIndicator')"

-
  name: upper-right-label-repeated
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - x: "*[1]"
  - t: "⠨"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: upper-right-label
  tag: msup
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "not(*[2][contains(., '+') or contains(., '-') or contains(., '−')] and"
  - "    *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - x: "*[1]"
  - t: "⠨"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: lower-right-label-repeated
  tag: msub
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "string-length(*[2]) <= 3 and"
  - "translate(*[2], substring(*[2], 1, 1), '') = '' and"
  - "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - x: "*[1]"
  - t: "⠸"
  - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 1"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"
  - test:
      if: "string-length(*[2]) > 2"
      then:
      - x: "DefinitionValue(substring(*[2], 1, 1), 'Braille', 'RussianLabelMarks')"

-
  name: lower-right-label
  tag: msub
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks') != ''"
  replace:
  - x: "*[1]"
  - t: "⠸"
  - x: "DefinitionValue(*[2], 'Braille', 'RussianLabelMarks')"

-
  name: signed-integer-number
  tag: [msub, munder]
  match: "*[2][self::m:mn and (substring(., 1, 1)='-' or substring(., 1, 1)='−' or substring(., 1, 1)='+') and translate(substring(., 2), '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - test:
      if: "substring(*[2], 1, 1)='+'"
      then: [t: "⠖"]
      else: [t: "⠤"]
  - x: "BrailleChars(translate(substring(*[2], 2), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: signed-integer
  tag: [msub, munder]
  match:
  - "*[2][self::m:mrow and count(*)=2 and"
  - " *[1][self::m:mo][.='-' or .='−' or .='+'] and"
  - " *[2][self::m:mn and translate(., '0123456789', '')='']]"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - test:
      if: "*[2]/*[1][.='+']"
      then: [t: "⠖"]
      else: [t: "⠤"]
  - x: "BrailleChars(translate(*[2]/*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: integer
  tag: [msub, munder]
  match: "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: integer-sequence
  tag: [msub, munder]
  match:
  - "*[2][not(self::m:mn) and translate(normalize-space(.), '0123456789⁣', '')='' and"
  - " not(.//m:mo[.=',' or .='،'])]"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - x: "BrailleChars(translate(normalize-space(*[2]), '0123456789⁣', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: infinity-index
  tag: [msub, munder]
  match: "*[2][.='∞']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - x: "*[2]"

-
  name: default
  tag: [msub, munder]
  match: "."
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munder"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - test:
      if: "*[2][self::m:mrow[m:mo[.='+']] or self::m:mfrac]"
      then: [t: "⠐"]
  - x: "*[2]"
  - t: "⠱"

-
  name: signed-integer-number
  tag: [msup, mover]
  match: "*[2][self::m:mn and (substring(., 1, 1)='-' or substring(., 1, 1)='−' or substring(., 1, 1)='+') and translate(substring(., 2), '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:mover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - test:
      if: "substring(*[2], 1, 1)='+'"
      then: [t: "⠖"]
      else: [t: "⠤"]
  - x: "BrailleChars(translate(substring(*[2], 2), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: signed-integer
  tag: [msup, mover]
  match:
  - "*[2][self::m:mrow and count(*)=2 and"
  - " *[1][self::m:mo][.='-' or .='−' or .='+'] and"
  - " *[2][self::m:mn and translate(., '0123456789', '')='']]"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:mover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - test:
      if: "*[2]/*[1][.='+']"
      then: [t: "⠖"]
      else: [t: "⠤"]
  - x: "BrailleChars(translate(*[2]/*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: chemistry-repeated-charge
  tag: msup
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or"
  - " *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "*[2][self::m:mrow and count(*) > 1 and not(*[not(self::m:mo[.='+' or .='-' or .='−'])])]"
  replace:
  - x: "*[1]"
  - t: "⠌"
  - x: "BrailleChars(translate(string(count(*[2]/*)), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
  - test:
      if: "*[2]/*[1][.='+']"
      then: [t: "⠖"]
      else: [t: "⠤"]

-
  name: chemistry-charge
  tag: msup
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or"
  - " *[1][self::m:mi or self::m:mtext or self::m:mrow or self::m:msub or self::m:mmultiscripts]) and"
  - "*[2][translate(., '+-−0123456789 ', '')=''] and"
  - "*[2][contains(., '+') or contains(., '-') or contains(., '−')]"
  replace:
  - x: "*[1]"
  - t: "⠌"
  - test:
    - if: "*[2][translate(., '+ ', '')='']"
      then:
      - test:
          if: "string-length(translate(normalize-space(*[2]), ' ', '')) > 1"
          then:
          - x: "BrailleChars(translate(string(string-length(translate(normalize-space(*[2]), ' ', ''))), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠖"
    - else_if: "*[2][translate(., '-− ', '')='']"
      then:
      - test:
          if: "string-length(translate(normalize-space(*[2]), ' ', '')) > 1"
          then:
          - x: "BrailleChars(translate(string(string-length(translate(normalize-space(*[2]), ' ', ''))), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠤"
    - else_if: "*[2][translate(substring(., 1, string-length(.) - 1), '0123456789', '')='' and substring(., string-length(.), 1)='+']"
      then:
      - x: "BrailleChars(translate(substring(*[2], 1, string-length(*[2]) - 1), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠖"
    - else_if: "*[2][translate(substring(., 1, string-length(.) - 1), '0123456789', '')='' and (substring(., string-length(.), 1)='-' or substring(., string-length(.), 1)='−')]"
      then:
      - x: "BrailleChars(translate(substring(*[2], 1, string-length(*[2]) - 1), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠤"
    - else:
      - x: "*[2]"

-
  name: integer
  tag: [msup, mover]
  match: "*[2][self::m:mn and translate(., '0123456789', '')='']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:mover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"

-
  name: default
  tag: [msup, mover]
  match: "."
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:mover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - test:
      if: "*[2][self::m:mfrac[not((*[1][self::m:mi or self::m:mn]) and (*[2][self::m:mi or self::m:mn]))]]"
      then: [t: "⠐"]
  - x: "*[2]"
  - t: "⠱"

-
  name: large-op-limits
  tag: [msubsup, munderover]
  match:
  - "count(*)=3 and"
  - "*[1][self::m:mo][translate(., '∫∬∭∮∑∏', '')='']"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munderover"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - test:
      if: "*[2][self::m:mn and translate(., '0123456789', '')='']"
      then:
      - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      else:
      - x: "*[2]"
      - t: "⠱"
  - test:
      if: "self::m:munderover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - test:
      if: "*[3][self::m:mn and translate(., '0123456789', '')='']"
      then:
      - x: "BrailleChars(translate(*[3], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      else:
      - x: "*[3]"
      - t: "⠱"

-
  name: chemistry-charge-with-subscript
  tag: msubsup
  match:
  - "(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')] or"
  - " *[1][self::m:mi or self::m:mtext or self::m:mrow]) and"
  - "*[3][translate(., '+-−0123456789', '')=''] and"
  - "*[3][contains(., '+') or contains(., '-') or contains(., '−')]"
  replace:
  - x: "*[1]"
  - test:
      if: "*[2][self::m:mn and translate(., '0123456789', '')='']"
      then:
      - t: "⠡"
      - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      else:
      - t: "⠡"
      - x: "*[2]"
      - t: "⠱"
  - t: "⠌"
  - test:
    - if: "*[3][translate(., '+', '')='']"
      then:
      - test:
          if: "string-length(*[3]) > 1"
          then:
          - x: "BrailleChars(translate(string(string-length(*[3])), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠖"
    - else_if: "*[3][translate(., '-−', '')='']"
      then:
      - test:
          if: "string-length(*[3]) > 1"
          then:
          - x: "BrailleChars(translate(string(string-length(*[3])), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠤"
    - else_if: "*[3][translate(substring(., 1, string-length(.) - 1), '0123456789', '')='' and substring(., string-length(.), 1)='+']"
      then:
      - x: "BrailleChars(translate(substring(*[3], 1, string-length(*[3]) - 1), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠖"
    - else_if: "*[3][translate(substring(., 1, string-length(.) - 1), '0123456789', '')='' and (substring(., string-length(.), 1)='-' or substring(., string-length(.), 1)='−')]"
      then:
      - x: "BrailleChars(translate(substring(*[3], 1, string-length(*[3]) - 1), '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
      - t: "⠤"
    - else:
      - x: "*[3]"

-
  name: default
  tag: [msubsup, munderover]
  match: "count(*)=3"
  replace:
  - x: "*[1]"
  - test:
      if: "self::m:munderover"
      then: [t: "⠨⠡"]
      else: [t: "⠡"]
  - test:
      if: "*[2][self::m:mrow[m:mo[.='+']] or self::m:mfrac]"
      then: [t: "⠐"]
  - x: "*[2]"
  - test:
      if: "self::m:munderover"
      then: [t: "⠨⠌"]
      else: [t: "⠌"]
  - x: "*[3]"
  - t: "⠱"

-
  name: left-labels
  tag: mmultiscripts
  match:
  - "not(ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "count(m:mprescripts/preceding-sibling::*) = 1 and"
  - "(m:mprescripts/following-sibling::*[1][not(self::m:none) and DefinitionValue(., 'Braille', 'RussianLabelMarks') != ''] or"
  - " m:mprescripts/following-sibling::*[2][not(self::m:none) and DefinitionValue(., 'Braille', 'RussianLabelMarks') != ''])"
  replace:
  - test:
      if: "m:mprescripts/following-sibling::*[1][not(self::m:none) and DefinitionValue(., 'Braille', 'RussianLabelMarks') != '']"
      then:
      - t: "⠸"
      - x: "DefinitionValue(m:mprescripts/following-sibling::*[1], 'Braille', 'RussianLabelMarks')"
  - test:
      if: "m:mprescripts/following-sibling::*[2][not(self::m:none) and DefinitionValue(., 'Braille', 'RussianLabelMarks') != '']"
      then:
      - t: "⠨"
      - x: "DefinitionValue(m:mprescripts/following-sibling::*[2], 'Braille', 'RussianLabelMarks')"
  - x: "*[1]"

-
  name: default
  tag: mmultiscripts
  match: "."
  variables:
  - Prescripts: "m:mprescripts/following-sibling::*"
  - NumChildren: "count(*)"
  - Postscripts: "*[position()>1 and position() < (last() + ($NumChildren mod 2) - count($Prescripts))]"
  replace:
  - test:
      if: "$Prescripts"
      then:
      - test:
          if: "not($Prescripts[1][self::m:none])"
          then:
          - t: "⠡"
          - test:
            - if: "$Prescripts[1][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Prescripts[1], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Prescripts[1]"
          - test:
              if: "not($Prescripts[1][self::m:mn and translate(., '0123456789', '')='']) and not($Prescripts[1][.='∞'])"
              then: [t: "⠱"]
      - test:
          if: "not($Prescripts[2][self::m:none])"
          then:
          - t: "⠌"
          - test:
            - if: "$Prescripts[2][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Prescripts[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Prescripts[2]"
          - test:
              if: "not($Prescripts[2][self::m:mn and translate(., '0123456789', '')='']) and not($Prescripts[2][.='∞'])"
              then: [t: "⠱"]
  - x: "*[1]"
  - test:
      if: "$Postscripts"
      then:
      - test:
          if: "not($Postscripts[1][self::m:none])"
          then:
          - t: "⠡"
          - test:
            - if: "$Postscripts[1][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Postscripts[1], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Postscripts[1]"
          - test:
              if: "not($Postscripts[1][self::m:mn and translate(., '0123456789', '')='']) and not($Postscripts[1][.='∞'])"
              then: [t: "⠱"]
      - test:
          if: "not($Postscripts[2][self::m:none])"
          then:
          - t: "⠌"
          - test:
            - if: "$Postscripts[2][self::m:mn and translate(., '0123456789', '')='']"
              then:
              - x: "BrailleChars(translate($Postscripts[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Russian')"
            - else:
              - x: "$Postscripts[2]"
          - test:
              if: "not($Postscripts[2][self::m:mn and translate(., '0123456789', '')='']) and not($Postscripts[2][.='∞'])"
              then: [t: "⠱"]

-
  name: default
  tag: menclose
  match: "."
  replace:
  - t: "⠣"
  - x: "*"
  - t: "⠜"

-
  name: chemical-formula-operator-bond
  tag: mo
  match: "@data-chemical-bond"
  replace:
  - test:
    - if: ".='-' or .=':'"
      then: [t: "⠤"]
    - else_if: ".='=' or .='∷'"
      then: [t: "⠦"]
    - else_if: ".='≡'"
      then: [t: "⠿"]
      else: [x: "text()"]

-
  name: chemical-reaction-operator
  tag: mo
  match:
  - "(@data-chem-equation-op or ancestor::*[@data-chem-equation or contains(@intent, ':chemical-equation')]) and"
  - "translate(., '+-=→⟶←⟵⇌⥂⥄↑↓', '')=''"
  replace:
  - test:
    - if: ".='+'"
      then: [t: "⠀⠖"]
    - else_if: ".='-'"
      then: [t: "⠀⠤"]
    - else_if: ".='='"
      then: [t: "⠀⠶"]
    - else_if: ".='→' or .='⟶'"
      then: [t: "⠀⠒⠕"]
    - else_if: ".='←' or .='⟵'"
      then: [t: "⠀⠦⠶"]
    - else_if: ".='⇌'"
      then: [t: "⠀⠒⠕⠀⠦⠶"]
    - else_if: ".='⥂'"
      then: [t: "⠀⠒⠕⠀⠦⠶"]
    - else_if: ".='⥄'"
      then: [t: "⠀⠦⠶⠀⠒⠕"]
    - else_if: ".='↑'"
      then: [t: "⠀⠰⠌"]
    - else_if: ".='↓'"
      then: [t: "⠀⠘⠡"]
    - else:
      - x: "text()"

-
  name: prefix-geometry-ops
  tag: mo
  match:
  - "parent::*[count(*) = 2 and name()='mrow' and not(preceding-sibling::*)] and"
  - "( .='∠' or .='△' or .='∪' )"
  replace:
  - x: "text()"
  - t: "#"

-
  name: operator-functions
  tag: mo
  match: "DefinitionValue(., 'Braille', 'RussianFunctionBraille') != ''"
  replace:
  - x: "DefinitionValue(., 'Braille', 'RussianFunctionBraille')"

-
  name: div-operator-function
  tag: mo
  match: "contains(., 'div')"
  replace:
  - t: "⠫⠙⠊⠧#"

-
  name: default
  tag: mo
  match: "."
  replace:
  - x: "text()"

-
  name: decimal-comma
  tag: mn
  match: "contains(., ',') and translate(., '0123456789,', '')=''"
  replace:
  - x: "BrailleChars(substring-before(., ','), 'Russian')"
  - t: "⠂"
  - x: "BrailleChars(translate(substring-after(., ','), '0123456789', '\ue020\ue021\ue022\ue023\ue024\ue025\ue026\ue027\ue028\ue029'), 'Russian')"

-
  name: default
  tag: mn
  match: "."
  replace:
  - x: "BrailleChars(., 'Russian')"

-
  name: functions
  tag: [mi, mtext]
  match: "DefinitionValue(., 'Braille', 'RussianFunctionBraille') != ''"
  replace:
  - x: "DefinitionValue(., 'Braille', 'RussianFunctionBraille')"

-
  name: div-function
  tag: [mi, mo, mtext]
  match: "contains(., 'div')"
  replace:
  - t: "⠫⠙⠊⠧#"

-
  name: default
  tag: [mi, mtext]
  match: "."
  replace:
  - x: "BrailleChars(., 'Russian')"

-
  name: default
  tag: ms
  match: "."
  replace:
  - test:
      if: "string(@lquote)!=''"
      then: [x: "@lquote"]
      else: [t: "⠦"]
  - x: "BrailleChars(., 'Russian')"
  - test:
      if: "string(@rquote)!=''"
      then: [x: "@rquote"]
      else: [t: "⠴"]

-
  name: default-children
  tag: "*"
  match: "*"
  replace:
  - x: "*"

-
  name: default-no-children
  tag: "*"
  match: "text()"
  replace:
  - x: "text()"

-
  name: default-no-text
  tag: "*"
  match: "."
  replace: [t: ""]
