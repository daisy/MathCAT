  - "translate(., '+-=→⟶←⟵⇌⥂⥄↑↓', '')=''"
  replace:
  - test:
    - if: ".='+'"
      then: [t: "⠀⠖"]
    - else_if: ".='-'"
      then: [t: "⠀⠤"]
    - else_if: ".='='"
      then: [t: "⠀⠶"]
    - else_if: ".='→' or .='⟶'"
      then: [t: "⠀⠒⠕"]
    - else_if: ".='←' or .='⟵'"
      then: [t: "⠀⠦⠶"]
    - else_if: ".='⇌'"
      then: [t: "⠀⠒⠕⠀⠦⠶"]
    - else_if: ".='⥂'"
      then: [t: "⠀⠒⠕⠀⠦⠶"]
    - else_if: ".='⥄'"
      then: [t: "⠀⠦⠶⠀⠒⠕"]
    - else_if: ".='↑'"
      then: [t: "⠀⠰⠌"]
    - else_if: ".='↓'"
      then: [t: "⠀⠘⠡"]
    - else:
      - x: "text()"

