---
-
  name: whitespace-omission
  tag: "!*"
  match: "not(self::m:math) and not($MatchingWhitespace) and (@data-previous-space-width >= 0.25 or @data-following-space-width >= 0.25)"
  replace:
   - with:
      variables: [MatchingWhitespace: "true()"]
      replace:
      - test:
        - if: "(@class='MathML-unit' or BaseNode(.)[@class='MathML-unit']) and @data-previous-space-width >= 0.25"  # BANA 5.3(a)
          then: [t: "W"]
        - else_if: "@data-previous-space-width > 1.1"
          then: [t: "⠬"]
        - else_if: "@data-previous-space-width >= 0.25"      # thickspace
          then: [t: "W"]
      - x: "."
      - test:
        - if: "(@class='MathML-unit' or BaseNode(.)[@class='MathML-unit']) and @data-following-space-width >= 0.25" # BANA 5.3(a)
          then: [t: "W"]
        - else_if: "@data-following-space-width > 1.1"
          then: [t: "⠬"]
        - else_if: "@data-following-space-width >= 0.25"      # thickspace
          then: [t: "W"]

-
   name: omission-intent
   tag: "!*"
   match: "contains(@intent, ':blank')"
   replace: 
   - t: "⠬"

-
   name: unicode-override
   tag: "*"
   match: "@data-unicode"
   replace: 
   - x: "@data-unicode"

-
  name: default
  tag: msqrt
  match: .
  replace: 
  - t: "⠩"
  - t: "⸨"
  - x: "*[1]"
  - t: "⸩"

-
  name: default
  tag: mroot
  match: "."
  replace: 
  - t: "⠩"
  # index is first - no grouping needed due to "Zone Change" after it
  - x: "*[2]"
  - t: "Z"   # zone change
  - t: "⸨"
  - x: "*[1]"
  - t: "⸩"
        
               
# Fraction rules
   # The fraction part of a mixed number is always simple
   # They also differ because a two character sequence is needed to bracket the fraction
   # The invisible plus should produce an empty string

-
  name: common-fraction-mixed-number
  tag: mfrac
  match:
    - "preceding-sibling::*[1][self::m:mo][text()='\u2064'] and" # preceding element is invisible plus
    - "*[1][self::m:mn][not(contains(., '.,'))]   and" 
    - "*[2][self::m:mn][not(contains(., '.,'))]"
  replace: 
  - t: "#"   # need to force a number sign between the numbers
  - x: "*[1]"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Finnish')"   # drop numbers for the numerator

-
  name: simple-number
  tag: mfrac
  match: "*[1][self::m:mn][not(contains(., '.,'))] and *[2][self::m:mn][not(contains(., '.,'))]"
  replace:
  - x: "*[1]"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Finnish')"   # drop numbers for the numerator
-
  name: default
  tag: mfrac
  match: "."
  replace:
  - test:
    # numerators allow invisible times without parens and apparently a few other things
    # It seems prefix "-" and postfix "!" are allowed, but nothing specific so I'm restricting to leaf elements
      if:
      - "*[1][self::m:mrow and  "
      - "     not(*[self::m:mo][.='\u2062']) and "
      - "     not(count(*)=2 and *[IsNode(., 'leaf')])"
      - "]"
      then:
      - t: "("
      - x: "*[1]"
      - t: ")"
      else:
      - x: "*[1]"
  - t: "W⠌"
  - t: "⸨"
  - x: "*[2]"
  - t: "⸩"


-
  # The value of @linethickness could be '0', '0px', '0em', '0.0', '0.0px', '0.0em', etc. Hence the translate(...)
   name: binomial-frac
   tag: mrow
   match: "IsBracketed(., '(', ')') and *[2][self::m:mfrac][number(translate(@linethickness, 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ%', '')) = 0]"
   replace: 
   - x: "*[1]"
   - x: "(*[2]/*[1])"
   - t: "⠯W"
   - x: "*[2]/*[2]"
   - x: "*[3]"

- name: binomial-table
  tag: mrow
  match: "IsBracketed(., '(', ')') and *[2][self::m:mtable][count(*)=2 and count(*[1])=1] and contains(@intent, 'binomial(')"
  replace:
     - x: "*[1]"
     - x: "*[2]/*[1]/*[1]/*[1]"
     - t: "⠯W"
     - x: "*[2]/*[2]/*[1]/*[1]"
     - x: "*[3]"

#
# Matrix/Determinant rules
# matrix and determinant are the same other than "matrix"/"determinant" based on the bracketing chars
# we don't do spatial layout, instead the beginning/ending of each row uses the enlarged bracketing chars
-
   name: default-matrix
   tag: mrow
   variables:
      - RowStart: "*[1]"
      - RowEnd: "*[3]"
   match:
      - "*[2][self::m:mtable] and"
      - (IsBracketed(., '(', ')') or IsBracketed(., '[', ']') or IsBracketed(., '|', '|'))
   replace: [x: "*[2]"]

-
   name: default-piecewise
   tag: mrow
  #  variables:
  #     - RowStart: ""
  #     - RowEnd: ""
   match:
      - "count(*) = 2 and *[1][self::m:mo and .='{'] and *[2][self::m:mtable]"
   replace:
   - t: "{"
   - x: "*[2]"
   - t: "}"     # end of case? (see p41)

-
   name: default-mtable
   tag: mtable
   match: "."
   replace: [x: "*"]
-
  name: default
  tag: [mtr, mlabeledtr]
  match: "."
  replace:
   - test: 
      if: "preceding-sibling::*"
      then: [t: "W⠐⠐W"]         # new line/row
   - x: "$RowStart"
   - test:
      if: .[self::m:mlabeledtr]
      then:
         - t: "⠗⠊⠧⠊⠝⠀⠕⠞⠎⠊⠅⠅⠕⠱"  # "row label:" ("rivin otsikko:")
         - x: "*[1]/*"           # contents of row label
   - test:
      if: .[self::m:mlabeledtr]
      then: [x: "*[position()>1]"]
      else: {x: "*"}
  #  - test: 
  #     if: "count(parent::*) > 1"
  #     then: [t: "⠠"]
   - x: $RowEnd
-
  name: default
  tag: mtd
  match: "."
  replace:
  - test:
      if: "*"
      then:
      - test: 
          if: "preceding-sibling::*"
          then: [t: 'W']
      - x: "*"
      # else nothing to braille

-
   name: no-content
   tag: math
   match: "not(*)"      # empty
   replace: [t: "W"]    # not sure that is right, but this shouldn't happen

-
  name: default
  tag: math
  match: "."
  variables:
  - RowStart: "''"           # empty string -- it needs to be set
  - RowEnd: "''"             # empty string -- it needs to be set
  - MatchingWhitespace: "false()"
  replace: [x: "*"]

# -
#   # add parentheses to the argument of a large operator that has components whose main operator is an invisible times
#   # this is done because of p49_summation_with_lower_upper_bounds and the integral above it.
#   # Note: '/⧸' do not carry large op precedence, and so their grouping (and hance matching) is different and needs a seperate rule
#     name: add-parens-to-large-operator-argument
#     tag: mrow
#     match:
#     - "count(*) mod 2 = 1 and parent::*[self::m:mrow and count(*)=2] and"            # likely infix with potential large op parent
#     - "*[position() mod 2 = 0][self::m:mo and .='\u2062'] and"        # all operators are invisible times (position is 1-based, so '= 0')
#     - "DEBUG(preceding-sibling::*[1])[(self::m:msubsup or self::m:munderover or self::m:msub or self::m:munder) and "
#     - "                        *[1][self::m:mo and translate(., '∫∬∭∮∑∏∐⋃⋂⋁⋀', '')='']]"  # large operators (slashes are for substitution)
#     replace:
#     - t: "("
#     - x: "*"
#     - t: ")"

-
    name: empty-mrow
    tag: mrow
    match: "not(*)"
    replace: [t: "W"] # not sure what is correct -- if in a fraction, probably something is better than nothing

-
   name: default
   tag: mrow
   match: "."
   replace: [x: "*"]


-
   # operator omission
   name: operator-omission
   tag: mo
   # normally(?) this is an omission, but the case 6'2" causes problems due to WIRIS
   # in that case, it doesn't put the ft/in in a superscript and thinks the space is an operator
   # canonicalization moves them into <msup> with base <mn>, so this shouldn't be an omission for that case
   match: ".='\u00A0' and @width > 1.1 and 
           not( preceding-sibling::*[1][self::m:msup and *[2][self::m:mo]] and
                following-sibling::*[1][self::m:msup and *[2][self::m:mo]] )"
   replace:
   - t: "⠬"   # empty space for omission

-
  name: default
  tag: mo
  match: "."
  replace:
  - x: "text()"


-
  name: default
  tag: mn
  match: "."
  replace:
  - x: "BrailleChars(., 'Finnish')"
  # - test:
  #     if: "not( count(following-sibling::*) = 1 and following-sibling::*[1] = '!' ) and
  #           not( count(following-sibling::*) = 2 and following-sibling::*[1] = '\u2062' and following-sibling::*[2] = '…' )"
  #     if: "translate(., '0123456789', '') = ''"
  #     then: [t: "W"]   # this is a number, so we need to signal the end of numeric mode
  - test:
      if: "not( count(following-sibling::*) = 1 and following-sibling::*[1] = '!' ) and
            not( count(following-sibling::*) = 2 and following-sibling::*[1] = '\u2062' and following-sibling::*[2] = '…' )"
      then_test:
          # complicated test to see if we are in the denominator and the next char is ")"
          # can't do this easily in braille.rs because looking for digit ')' needs to be in the denominator and
          # that's hard to tell from a string without markers
          if: "ancestor::*[preceding-sibling::* and
                            self::m:mfrac[number(translate(@linethickness, 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ%', '')) != 0]]
                            [not(preceding-sibling::*[not(preceding-sibling::*) and ancestor::m:mfrac])] and
               following::*[1] = ')'"
          then: [t: "⠠"]
          else: [t: "W"]   # this is a number, so we need to signal the end of numeric mode
      
-
   # FIX: need to deal with all caps
   name: default
   tag: [mi, mtext]
   match: "."
   replace:
   - x: "BrailleChars(., 'Finnish')"

-
   name: default
   tag: mstyle
   match: "."
   replace:
   - test:
      if: "*"
      then: [x: "*"]
      # else do nothing -- no content

-
  name: mhchem-hack
  # this captures the output for the mhchem's "<=>", "<<=>", and "<=>>" output (there are no Unicode arrows for them)
  # this isn't a perfect match, but should be good enough and allows merging all three (see github.com/NSoiffer/MathCAT/issues/60)
  tag: mover
  match:
  -    "*[1][substring(., 1, 1)='↽'] and"
  -    "*[2][substring(., string-length(), 1)='⇀']"
  replace:
  - t: "W"
  - test:
      if: "*[1][self::m:mrow]"
      then_test:
          if: "*[2][self::m:mrow]"
          then: [x: "'🣒'"]    # this is currently unassigned and may get used by UTC at some point (<=>)
          else: [x: "'🣔'"]    # this is currently unassigned and may get used by UTC at some point (<<=>)
      else: [x: "'🣓'"]        # this is currently unassigned and may get used by UTC at some point (<==>>)
  - t: "W"

-
  name: single-char-exceptions
  tag: [mover, munder]
  match: "*[2][string-length(.) = 1 and translate(., '_¯','')='']"
  replace: 
  - t: "⸨"
  - x: "*[1]"
  - t: "⸩"
  - test:
      if: "self::m:mover"
      then:
      - t: "⠱"
      - test:
          if: "*[1][.='arc']"
          then: [t: "W"]
      else: [t: "⠤"]

-
  name: single-char-exceptions
  tag: msup
  match: "*[2][translate(., \"'*`ª°²³´¹º‘’“”‟′″‴‵‶‷⁗\",'')='']"
  replace:
  - test:
    - if: "*[1][self::m:mn]"
      then:
      - x: "*[1]"
      - t: "W"
    - else:
      - t: "⸨"
      - x: "*[1]"
      - t: "⸩"
  - x: "*[2]"

-
  name: squared   # shorthand leaves off the '2'
  tag: msup
  match: "*[2][self::m:mn and .='2']"
  replace:
  - x: "*[1]"
  - t: "↗W"

-
  # Chemistry has a special rule for numerical subscripts (note base is not necessarily a chemical element)
  name: chemistry
  tag: [msub, msubsup]
  match: "*[2][self::m:mn][not(contains(., '.,'))] and (*[1][@data-chem-element] or ancestor-or-self::*[@data-chem-formula])"
  replace:
  - x: "*[1]"
  - x: "BrailleChars(translate(*[2], '0123456789', '\ue000\ue001\ue002\ue003\ue004\ue005\ue006\ue007\ue008\ue009'), 'Finnish')"   # drop numbers for the numerator
  - test:
      if: "self::m:msubsup"
      then:
      - t: "↗"
      - t: "⸨"
      - x: "*[3]"
      - t: "⸩"
      - t: "W"

-
  # we look for a superscript that starts with ")"
  name: divided-by
  tag: msup
  match: "*[2][self::m:mrow and count(*)=2 and *[1][.='(']]"
  replace:
  - x: "*[1]"
  - t: "W〘"
  - x: "*[2]/*[2]"
-
  name: integral
  tag: [msub, munder]
  match: "*[1][translate(., '/⧸∫∬∭∮', '')=''] "
  replace:
  - x: "*[1]"
  # the spec says these should be the same (p44) but the examples only treat integrals differently
  - t: "↓⸨"
  - x: "*[2]"
  - t: "⸩Z"

-
  name: integral
  tag: [msubsup, munderover]
  match: "*[1][translate(., '/⧸∫∬∭∮', '')=''] "
  replace:
  - x: "*[1]"
  - t: "↓⸨"
  - x: "*[2]"
  - t: "⸩↑⸨"
  - x: "*[3]"
  - t: "⸩Z"

-
  name: sum-product
  tag: [msub, munder]
  match: "*[1][translate(., '∑∏∐⋃⋂⋁⋀', '')='' or .='lim']"
  replace:
  - x: "*[1]"
  # the spec says these should be the same (p44) but the examples only treat integrals differently (likey simple but brackets just in case)
  - t: "↘⸨"
  - x: "*[2]"
  - t: "⸩Z"

-
  name: sum-product
  tag: [msubsup, munderover]
  match: "*[1][translate(., '∑∏∐⋃⋂⋁⋀', '')='' or .='lim']"
  replace:
  - x: "*[1]"
  - t: "↘⸨"
  - x: "*[2]"
  - t: "⸩↑⸨"
  - x: "*[3]"
  - t: "⸩Z"

-
  name: log
  tag: [msub]
  match: "*[1][.='log']"
  replace:
  - x: "*[1]"
  # the spec says subscript directly follows log without subscript indicator
  - t: "⸨"
  - x: "*[2]"
  - t: "⸩Z"

-
  name: default
  tag: [msub, msup, munder, mover]
  match: "."
  replace:
  - test:
      if: "(self::m:munder or self::m:mover)"
      then:
      - t: "⸨"
      - x: "*[1]"
      - t: "⸩"
      else:
      - x: "*[1]"
  - test:
      - if: "self::m:msup"
        then: [t: "↗"]
      - else_if: "self::m:msub or self::m:munder"
        then: [t: "↘"]
        else: [t: "↑"]
  - test:
      - if: "self::m:msup and *[2][.='2']"
        then: [t: ""]                # superscripts=2 don't include the '2'
      - else:
        - t: "⸨"
        - x: "*[2]"
        - t: "⸩"
  - test:
      - if: "(self::m:msub or self::m:munder) and following-sibling::*[1][.='\u2062']"
        then: [t: "Z"]    # just a guess for munder -- couldn't find anything in the spec




-
  name: msubsup_default_mmultiscripts_equiv
  tag: [msubsup, mmultiscripts] # mmultiscripts with only sub/sup postscript
  match: "count(*)=3"    # catches mmultiscripts equiv
  replace:
  - t: "⸨"
  - x: "*[1]"
  - t: "⸩↘⸨"
  - x: "*[2]"
  - t: "⸩↗⸨"
  - x: "*[3]"
  - t: "⸩"

-
  name: default
  tag: munderover
  match: "."
  replace:
  - x: "*[1]"
  - t: "↘⸨"
  - x: "*[2]"
  - t: "⸩↗⸨"
  - x: "*[3]"
  - t: "⸩"
  - t: "Z"

-
  # only the superscript is required for this rule
  name: atomic-number
  tag: mmultiscripts
  match: "count(*)=4 and *[2][self::m:mprescripts] and *[4][self::m:mn]"
  replace:
  - test:
      if: "not(*[3][self::m:none])"
      then:
      - t: "↘"
      - x: "*[3]"
  - t: "↗"
  - x: "*[4]"
  - x: "*[1]"

-
  # look for xxx) in the pre-superscript
  name: multiple-by
  tag: mmultiscripts
  match: "count(*)=4 and *[2][self::m:mprescripts] and *[3][self::m:none] and *[4][self::m:mrow and count(*)=2 and *[2][.=')']]"
  replace:
  - x: "*[4]/*[1]"
  - t: "〙W"
  - x: "*[1]"

-
  name: default
  tag: mmultiscripts
  match: "."
  variables:
  # computing the number of postscripts is messy because of <mprescripts> being optionally present -- we use "mod" to get the count right
  - Prescripts: "m:mprescripts/following-sibling::*"
  - NumChildren: "count(*)"       # need to stash this since the count is wrong inside '*[...]' below
  - Postscripts: "*[position()>1 and position() < (last() + ($NumChildren mod 2) -count($Prescripts))]"
  replace:
  - test:
      if: "$Prescripts"
      then:
      - test:
          if: "not($Prescripts[1][self::m:none])"
          then:
          - t: "↗"
          - t: "⸨"
          - x: "$Prescripts[1]"
          - t: "⸩"
      - test:
          if: "not($Prescripts[2][self::m:none])"
          then:
          - t: "↘"
          - t: "⸨"
          - x: "$Prescripts[2]"
          - t: "⸩"
      - test:
         if: "count($Prescripts)>2"
         then:
         - test:
            if: "not($Prescripts[3][self::m:none])"
            then:
            - t: "↗"
            - t: "⸨"
            - x: "$Prescripts[3]"
            - t: "⸩"
         - test:
            if: "not($Prescripts[4][self::m:none])"
            then:
            - t: "↘"
            - t: "⸨"
            - x: "$Prescripts[4]"
            - t: "⸩"
         - test:
            if: "count($Prescripts) > 4"   # give up and just dump them out so at least the content is there
            then: [x: "$Prescripts[position() > 4]"]

  - x: "*[1]"
  - test:
      if: "$Postscripts"
      then:
      - test:
          if: "not($Postscripts[1][self::m:none])"
          then:
          - t: "↗"
          - t: "⸨"
          - x: "$Postscripts[1]"
          - t: "⸩"
      - test:
          if: "not($Postscripts[2][self::m:none])"
          then:
          - t: "↘"
          - t: "⸨"
          - x: "$Postscripts[2]"
          - t: "⸩"
      - test:
          if: "count($Postscripts)>2"
          then:
          - test:
              if: "not($Postscripts[3][self::m:none])"
              then:
              - t: "↗"
              - t: "⸨"
              - x: "$Postscripts[3]"
              - t: "⸩"
          - test:
              if: "not($Postscripts[4][self::m:none])"
              then:
              - t: "↘"
              - t: "⸨"
              - x: "$Postscripts[4]"
              - t: "⸩"
          - test:
              if: "count($Postscripts)>4"
              then:
              - test:
                  if: "not($Postscripts[5][self::m:none])"
                  then:
                  - t: "↗"
                  - t: "⸨"
                  - x: "$Postscripts[5]"
                  - t: "⸩"
              - test:
                  if: "not($Postscripts[6][self::m:none])"
                  then:
                  - t: "↘"
                  - t: "⸨"
                  - x: "$Postscripts[6]"
                  - t: "⸩"
              - test:
                  if: "count($Postscripts)>6"
                  then:
                  - test:
                      if: "not($Postscripts[7][self::m:none])"
                      then:
                      - t: "↗"
                      - t: "⸨"
                      - x: "$Postscripts[7]"
                      - t: "⸩"
                  - test:
                      if: "not($Postscripts[8][self::m:none])"
                      then:
                      - t: "↘"
                      - t: "⸨"
                      - x: "$Postscripts[8]"
                      - t: "⸩"
                  - test:
                      if: "count($Postscripts) > 8"   # give up and just dump them out so at least the content is there
                      then:
                      - x: "$Postscripts[position() > 8]"
                  

-
  # Note: @notation can contain more than one value
  # I don't think UEB has a good way to represent all notations, especially when in combination
  # Note:
  #   Shape indicator: ⠫
  #   Physical enclosure: ⠪  (think plus inside of a circle)
  #   Superposition indicator: ⠯  (think contour integral)
  #   Cancellation: ⠈⠱ (line through previous char -- will use for horizontal, vertical, diagonal lines)
  #   Line over/under: use GTM 12 bar rule (over ⠱, under ⠠⠱)
  #   Horizontal juxtaposition indicator: ⠿
  #   Vertical juxtaposition indicator: ⠻ (think ≗)
  #   Termination indicator: ⠱ 
  #
  # We place left and right outside of other notations
  # Boxes and circle are does as physical enclosure (shape before base)
  # Arrows are done as superposition (after base)
  # top and bottom are done as "bars" (GTM 12) (after base)

   name: default
   tag: menclose
   match: "."
   # FIX: can't find a rule that says anything about comparison operator spacing and enclosure
   variables: [AddSpaces: "parent::*[self::m:mrow] and *[1][self::m:mo and IsInDefinition(., 'Braille', 'NemethComparisonOperators')]"]
   replace:
   - test:
      if: "contains(concat(' ', normalize-space(@notation), ' '), ' left ')"                  #avoid 'leftarrow'
      then: [t: "⠸"]
   - test:
      if: "contains(@notation,'box')"                  # box and roundedbox
      then:
      # - test:
      #       if: "$AddSpaces"
      #       then: [t: " "]
      - t: "1⠫⠼⠙"                                  # square (no rectangle in UEB)
   - test:
      if: "contains(@notation,'circle')"
      then:
      # - test:
      #    if: "$AddSpaces"
      #    then: [t: " "]
      - t: "1⠫⠿"                                  # circle (no oval in UEB)
# ??? What should happen with arrow?
