 - "β³Π": [T: "CGLβ†ö"]             # 0x2126 (Ohm sign (capital Greek omega))
 - "βàÜ": [T: "CGLβ†ô"]             # 0x2206 (Increment (capital Greek delta))
 - "βàè": [T: "CGLβ†è"]             # 0x220F (Product (capital Greek pi))
 - "βàë": [T: "CGLβ†é"]             # 0x2211 (Sum (capital Greek sigma))

 - "!":                        # 0x0021 (exclamation point) 
    - test:
        if: "self::m:mtext"
        then: [t: "β†≤"]          # FI: regular exclamation point in text
        else: [t: "β††β†≤"]         # FI: factorial

 - "$": [T: "β†°"]                # 0x0024 (dollar sign)
 - "%": [T: "β†Ι"]                # 0x0025 (percent sign)
 - "&": [T: "β†·"]                # 0x0026 (ampersand (and, logical product))
 - "(": [T: "("]                # 0x0028 (left parenthesis -- handled later)
 - ")": [T: ")"]                # 0x0029 (right parenthesis -- handled later)
 - "+":                         # 0x002B (regular plus)
     - test:               
        if: "self::m:mo and parent::m:mrow and preceding-sibling::*"
        then: [t: "Wβ†•"]         # infix plus
        else: [t: "β†•"]          # unary plus
 - "-":                         # 0x002D (minus)
     - test:
        - if: "@data-chemical-bond"
          then: [t: "Wβ†£"]
          # we need to recognize "set difference" -- heuristic is the operands are both capital letters
        - else_if: "@intent='set-difference' or
                    parent::*[1][self::m:mrow and count(*)=3 and
                              *[1][self::m:mi and string-length(.) = 1 and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = ''] and
                              *[3][self::m:mi and string-length(.) = 1 and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = ''] ]"
          then: [t: "Wβ†≥β†Λ"]        # set difference
        - else_if: "self::m:mo and parent::m:mrow and preceding-sibling::*"
          then: [t: "Wβ†Λ"]        # infix minus
          else: [t: "β†Λ"]         # unary minus
 - ".":                 # 0x002E # FI: used as a thousand separator
    - test:
        if: "self::m:mn"
        then: [T: "Nβ†³"]
        else: [T: "β†³"]

 - "/":                         # 0x002F (diagonal fraction line)
    - test:
        if: "@intent='substitution' or parent::*[self::m:msubsup or self::m:munderover]"
        then: [T: "β†Η"]          # see p44 (similar to integral)
        else: [T: "Wβ†¨"]
 - "βßΗ":                         # 0x002F (diagonal fraction line)
    - test:
        if: "@intent='substitution' or parent::*[self::m:msubsup or self::m:munderover]"
        then: [T: "β†Η"]          # see p44 (similar to integral)
        else: [T: "Wβ†¨"]
 - "ΟΖ": [T: "Wβ†¨"]               # 0x00F7 FI: Used as division sign.

 - ":":                         # 0x003A (colon)
   # sometimes (for division or ratio) it is dots 34 and sometimes (for function def) it is dots 25
   # the following is a very crude test that looks for "XXX : YYY βÜ£ ZZZ". Awaiting better information to improve the test.
    - test:
        - if: "@data-chemical-bond"
          then: [t: "Wβ†Ü"]
        - else_if: "preceding-sibling::*[1][name(BaseNode(.))='mi'] and 
               following-sibling::*[1][self::m:mrow and *[2][.='βÜ£']]"
          then: [t: "β†£W"]
          else: [t: "Wβ†¨"]

 - ";": [t: "β†ÜW"]               # 0x003B (Semicolon)
 - "<": [T: "Wβ†ΘW"]               # 0x003C (less than sign)
 - "=":                          # 0x003D (regular equals sign)
     - test:
        - if: "@data-chemical-bond"
          then: [t: "Wβ†£β†£"]
        - else_if: "ancestor::*[position()=2 and (self::m:msubsup or self::m:munderover)]"
          then: [t: "β†Δ"]
          else: [t: "Wβ†Ε"]

 - ">": [T: "Wβ†±W"]               # 0x003E (greater than sign ( regular ))
 - "?": [t: "Pβ†Δ"]                # 0x003F (Question mark)
 - "@": [t: "β†à"]               # 0x0040 (Commercial at sign)
 - "[": [T: "["]                # 0x005B (left square bracket)
 - "]": [T: "]"]                # 0x005D (right square bracket)
 - "_": [t: "β†§"]               # 0x005F (Low line (underscore))
 - "{": [T: "{"]                # 0x007B ( left curly brace)
 - "|":                         # 0x007C (vertical bar)
    - test:
      # catch |: notation
      # last child, inside a mrow with first child not | and the next child of the parent is ":"
        - if: ". and .. and
               not(following-sibling::*) and
               parent::*[self::m:mrow and count(*)=2 and not(*[1][.='|']) and
                         parent::*[self::m:mrow] and following-sibling::*[1][.=':']]
               "
          then: [t: "πùê•β†Η"]
        - else_if: "not(parent::*[self::m:mrow and count(*)=3 and *[1]='|'and *[3]='|'])"
          then: [t: "Wβ†ΗW"]   # single vertical bar
        - else_if: "parent::*/*[2][self::m:mtable]"
          then: [t: "β†Η"]    # these act as brackets around the rows and shouldn't have whitespace dropped
          else: [t: "|"]     # absolute value -- need to use "|"" because whitespace needs to caught/dropped before it
