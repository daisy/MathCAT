# Finnish characters
#
# Finnish specification for 6 dot math braille on the braille authority's web page (https://www.pistekirjoitus.fi/julkaisut/matematiikka-ja-tietotekniikka/) titled "Matematiikan, fysiikan ja kemain pistemerkinnΟΛt". Roughly translates to "Braille for mathematics, physics and chemistry." These rules are based on the edition published in 2022.
#
# Some chars that originally came from an Excel spreadsheet created by Georgios Kouroupetroglou (see https://access.uoa.gr/mathbraille), based on Swedish characters.
# 
# The UEB translation makes use of some non-braille chars as flags
#    L -- what follows is a letter
#    N -- what follows is a digit
#    C -- precedes L for capital letters
#    G -- precedes L for Greek Letters (after C for capitals)
#  Typeface Indicators ("typeforms")
#    B bold, I Italic, S Sans-serif, T script, D, Fraktur, πùîΙ blackboard-bold
#    the type face indicators can be combined with B (first) and I (second)
#  Standing alone chars:
#    Any character which acts as a standing alone character (e.g, "{") needs each braille symbol to be labeled
#    o -- opening/left side, c -- closing/right side, b -- both open and close (e.g, '"')

 - "0": [T: "Nβ†ö"]                # 0x0030 (digit zero)
 - "1": [T: "Nβ†¹"]                # 0x0031 (digit one)
 - "2": [T: "Nβ†É"]                # 0x0032 (digit two)
 - "3": [T: "Nβ†â"]                # 0x0033 (digit three)
 - "4": [T: "Nβ†ô"]                # 0x0034 (digit four)
 - "5": [T: "Nβ†ë"]                # 0x0035 (digit five)
 - "6": [T: "Nβ†΄"]                # 0x0036 (digit six)
 - "7": [T: "Nβ†¦"]                # 0x0037 (digit seven)
 - "8": [T: "Nβ†™"]                # 0x0038 (digit eight)
 - "9": [T: "Nβ†ä"]                # 0x0039 (digit nine)

 - " ":                        # 0x20 (Space)
     - test:
        if: "self::m:mn"
        then: [T: "Nβ†³"]
        else: [T: "W"]
 - "¬†":                        # 0xa0 (Non-breaking Space)
     - test:
        - if: "self::m:mn"
          then: [T: "Nβ†³"]
        - else_if: "following-sibling::*[1][@class='MathML-unit' or BaseNode(.)[@class='MathML-unit']]"
          then: [T: "πùê•"]
          else: [T: "W"]
 - ",":                        # 0x2c (Comma)
     - test:
        if: "self::m:mn"
        then: [T: "Nβ†²"]
        else: [T: ",W"]

 - "β¹Γ":                            # 0x2061β¹Γ (invisible function apply)
    - test:  # add some whitespace for the function apply for  "tan x", etc
        if:
        - "preceding-sibling::*[1][IsInDefinition(BaseNode(.), 'Braille', 'TrigFunctionNames')] and " 
        - "not(following-sibling::*[1][IsBracketed(., '', '')])"
        then: [t: "W"]
        else: [t: ""]

 - "β¹Δ":                        # 0x2062 (invisible times)
     - test:
        #  don't add whitespace when you have consecutive vars (taking into account pseudo scripts), or...
        #  if what follows is an opening bracket (any kind) or a 2D structure
        #  of if multiplication is the only operator in the numerator of a fraction
        if: "@data-function-guess='true' or
             (preceding-sibling::*[1][self::m:mi or
                                     (self::m:msup and *[2][translate(., '*`¬Σ¬Α¬≤¬≥¬¥¬Ι¬ΚβÄ‰βÄôβÄ€βÄùβÄüβÄ≤βÄ≥βÄ¥βÄΒβÄΕβÄΖβ¹½','')='']) or
                                     (self::m:mrow and *[last()][self::m:mi])] and
              (following-sibling::*[1][self::m:mi or
                                      (self::m:mrow and *[1][self::m:mi])])
             ) or
              (preceding-sibling::*[1][self::m:mn] and following-sibling::*[1][self::m:mi and .='βÄΠ']) or
              (preceding-sibling::*[1][self::m:mi and (.='$' or .='¬Θ')] and following-sibling::*[1][self::m:mn])
            "
        then: [t: ""]
        else: [t: "W"]

 - "β¹Θ": [T: ""]                 # 0x2063β¹Γ (invisible separator)
 - "β¹Λ": [T: ""]                 # 0x2064 (invisible plus)

