 - "Ο½": [T: "Wβ†Αβ†³"]                # 0x00D7 (vector or cross product)
 - "βÄΑ": [T: "β†£β†Ι"]                # 0x2030 (per mille sign)
 - "βÄΠ": [t: "β†³β†³β†³"]               # 0x2026 (ellipsis)
 - "βÄ≤":                         # 0x2032 (single prime)
    - test:
        if: "parent::m:msup and preceding-sibling::*[1][self::m:mn]"
        then: [t: "β†®"]         # interpret as apostrophe ("minutes")
        else: [t: "β†î"]
 - "βÄ≥":                         # 0x2033 (double prime)
    - test:
        if: "parent::m:msup and preceding-sibling::*[1][self::m:mn]"
        then: [t: "β†Η"]         # interpret as double quote ("seconds")
        else: [t: "β†îβ†î"]
