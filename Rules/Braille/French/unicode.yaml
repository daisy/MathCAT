 - "{":                          # 0x007B ( left curly brace)
    - test:
        if: "following-sibling::*[1][self::m:mtable]"
        then_test:
            if: "count(following-sibling::*[1]/*) = 1"
            then: [t: "⠨⠦"]
            else: [t: "⠸⠦"]
        else: [t: "⠨⠦"]   # regular brace
