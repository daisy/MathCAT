---
-
  name: whitespace-omission
  tag: "!*"
  match: "not(self::m:math) and not($MatchingWhitespace) and (@data-previous-space-width >= 0.35 or @data-following-space-width >= 0.35)"
  replace:
   - with:
      variables: [MatchingWhitespace: "true()"]
      replace:
      - test:
        - if: "@class='MathML-unit' or BaseNode(.)[@class='MathML-unit'] or @data-previous-space-width >= 0.35"  # BANA 5.3(a)
          then: [t: "W"]
      - x: "."
      - test:
        - if: "@class='MathML-unit' or BaseNode(.)[@class='MathML-unit'] or @data-following-space-width >= 0.35" # BANA 5.3(a)
          then: [t: "W"]

-
   name: omission-intent
   tag: "!*"
   match: "contains(@intent, ':blank')"
   replace: 
   - t: "⠬"

-
   name: unicode-override
   tag: "*"
   match: "@data-unicode"
   replace: 
   - x: "@data-unicode"

-
  name: default
  tag: msqrt
  match: "."
  replace: 
  - t: "b⠜"
  - test:
      if: "NeedsToBeGrouped(*[1], 'French', true())"
      then:
      - t: "o"
      - x: "*[1]"
      - t: "c"
      else:
      - x: "*[1]"
  - t: "e"

-
  name: default
  tag: mroot
  match: "."
  replace: 
  - t: "b"
  - t: "L⠈"    # this ("L") is a hack -- it allows the optional group indicators to be added if needed before the mroot
  - test:
      if: "NeedsToBeGrouped(*[2], 'French', false())"
      then:
      - t: "o"
      - x: "*[2]"
      - t: "c"
      else:
      - x: "*[2]"
  - t: "⠜"
  - test:
      if: "NeedsToBeGrouped(*[1], 'French', false())"
      then:
      - t: "o"
      - x: "*[1]"
      - t: "c"
      else:
      - x: "*[1]"
  - t: "e"
      
               
# Fraction rules
   # The fraction part of a mixed number is always simple
   # They also differ because a two character sequence is needed to bracket the fraction
   # The invisible plus should produce an empty string

-
  name: common-fraction-mixed-number
  tag: mfrac
  match:
      - "preceding-sibling::*[1][self::m:mo][text()='\u2064'] and" # preceding element is invisible plus
      - "*[1][self::m:mn][not(contains(., '.'))]   and" 
      - "*[2][self::m:mn][not(contains(., '.'))]"
  replace: 
  - t: "b"
  - x: "*[1]"
  - t: "N⠌"
  - x: "*[2]"
  - t: "e"

-
  name: default
  tag: mfrac
  match: "."
  replace:
  - t: "b"
  - test:
      if: "NeedsToBeGrouped(*[1], 'French', true())"
      then:
      - t: "o"
      - x: "*[1]"
      - t: "c"
      else:
      - x: "*[1]"
  - t: "⠌"
  - test:
      if: "NeedsToBeGrouped(*[2], 'French', true())"
      then:
      - t: "o"
      - x: "*[2]"
      - t: "c"
      else:
      - x: "*[2]"
  - t: "e"
-
  name: default-mtable
  tag: mtable
  match: "."
  replace:
  - x: "*"
-
  name: default
  tag: [mtr, mlabeledtr]
  match: "."
  replace:
  - test: 
      if: "preceding-sibling::*"
      then: [t: "W⠠⠜W"]
   
  #  - test:
  #     if: .[self::m:mlabeledtr]
  #     then:
  #        - t: "⠗⠕⠺W⠇⠁⠃⠑⠇⠸⠒"  # "row label:"
  #        - x: "*[1]/*"           # contents of row label
  - test:
      if: .[self::m:mlabeledtr]
      then: [x: "*[position()>1]"]
      else: {x: "*"}
  - test:
      if: "following-sibling::* "
      then: [t: "W"]

-
  name: default
  tag: mtd
  match: "."
  replace:
  - test:
      if: "preceding-sibling::*"
      then: [t: "W"]
  - test:
      if: "*[1][self::m:mtext and .=' ']"  # empty or non-breaking space (canonicalized to this)
      then: [t: "⠐⠂"]
      else: [x: "*"]

-
   name: no-content
   tag: math
   match: "not(*)"      # empty
   replace: [t: "W"]    # not sure that is right, but this shouldn't happen

-
  name: default
  tag: math
  match: "."
  variables:
  - MatchingWhitespace: "false()"
  replace:
  - test:
      if: "@display='inline' and not(*[1][self::m:mi])"   # FIX: should check to make sure it is only (Roman?) letters 
      then: [t: "P"]  # Add inline indicator
  - x: "*"

-
    name: empty-mrow
    tag: mrow
    match: "not(*)"
    replace: [t: "W"] # not sure what is correct -- if in a fraction, probably something is better than nothing

-
   name: binomial-frac
   tag: mrow
   match: "IsBracketed(., '(', ')') and *[2][self::m:mfrac][@linethickness=0]"
   replace: 
   - t: "⠘⠦"   # large left parenthesis
   - x: "*[2]/*[1]"
   - t: "⠠⠜"
   - x: "*[2]/*[2]"
   - t: "⠘⠴"   # large right parenthesis

