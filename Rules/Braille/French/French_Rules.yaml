-
  # integral rules -- need to group the integrand (but not the 'd x')
  # we look for what follows the integral and check for 'd' in the next to last element and group what comes before it (assuming there is more than one element)
  # note: we need to skip the invisible times when checking for 'd'
  name: integrals
  tag: mrow
  match: "BaseNode(*[1])[translate(., '∫∬∭∮', '')=''] and
          *[2][self::m:mrow][count(*)>5 and *[last()-2][self::m:mi][.='d' or .='ⅆ']]"
  replace:
  - x: "*[1]"
  - t: "o"
  - x: "*[2]/*[position() <= last()- 4]"
  - t: "c"
  - x: "*[2]/*[last()-2]"
  - x: "*[2]/*[last()]"

